<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>biolnk</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --bg: #080810;
  --surface: rgba(255,255,255,0.04);
  --surface-hover: rgba(255,255,255,0.07);
  --border: rgba(255,255,255,0.08);
  --border-hover: rgba(255,255,255,0.18);
  --text: #f0f0f5;
  --muted: rgba(240,240,245,0.45);
  --accent: #5865F2;
  --accent-glow: rgba(88,101,242,0.35);
  --success: #4ade80;
  --danger: #f87171;
  --radius: 14px;
  --radius-sm: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── CANVAS ── */
canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ── LAYOUT ── */
#root {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 16px 80px;
}

/* ── CARD ── */
.card {
  width: 100%;
  max-width: 420px;
  background: rgba(12, 12, 22, 0.85);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 36px 32px;
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  animation: cardIn 0.5s cubic-bezier(0.16,1,0.3,1) both;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 32px 64px rgba(0,0,0,0.5);
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(20px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* ── LOGO / WORDMARK ── */
.wordmark {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 28px;
  letter-spacing: -0.5px;
  margin-bottom: 4px;
  background: linear-gradient(135deg, #fff 30%, rgba(255,255,255,0.5));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.wordmark span {
  background: linear-gradient(135deg, var(--accent), #a78bfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.tagline {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 28px;
  letter-spacing: 0.02em;
}

/* ── SECTION LABEL ── */
.section-label {
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
  margin-top: 20px;
}
.section-label:first-of-type { margin-top: 0; }

/* ── INPUTS ── */
input, select, textarea {
  width: 100%;
  padding: 11px 14px;
  margin: 4px 0;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: var(--radius-sm);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
}
input:focus, select:focus, textarea:focus {
  border-color: var(--border-hover);
  background: var(--surface-hover);
  box-shadow: 0 0 0 3px rgba(88,101,242,0.12);
}
input::placeholder { color: var(--muted); }
select option { background: #141424; }
input.error { border-color: var(--danger); box-shadow: 0 0 0 3px rgba(248,113,113,0.12); }
input.ok    { border-color: var(--success); box-shadow: 0 0 0 3px rgba(74,222,128,0.12); }

/* ── BUTTONS ── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 11px 20px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.18s ease;
  text-decoration: none;
  white-space: nowrap;
}
.btn:hover {
  background: var(--surface-hover);
  border-color: var(--border-hover);
  transform: translateY(-1px);
}
.btn:active { transform: translateY(0); }
.btn:disabled { opacity: 0.38; cursor: not-allowed; transform: none; }

.btn-primary {
  background: var(--accent);
  border-color: transparent;
  color: #fff;
  font-weight: 600;
  box-shadow: 0 4px 20px var(--accent-glow);
}
.btn-primary:hover {
  background: #6872f5;
  border-color: transparent;
  box-shadow: 0 6px 28px var(--accent-glow);
}

.btn-discord {
  background: var(--accent);
  border-color: transparent;
  color: #fff;
  font-weight: 600;
  font-size: 15px;
  padding: 13px 24px;
  width: 100%;
  border-radius: var(--radius);
  box-shadow: 0 4px 24px var(--accent-glow);
}
.btn-discord:hover {
  background: #6872f5;
  border-color: transparent;
  box-shadow: 0 8px 32px var(--accent-glow);
}
.btn-discord svg { width: 22px; height: 22px; flex-shrink: 0; }

.btn-sm {
  padding: 7px 14px;
  font-size: 13px;
  border-radius: 6px;
}

.btn-ghost {
  background: transparent;
  border-color: transparent;
  color: var(--muted);
  padding: 7px 12px;
}
.btn-ghost:hover {
  background: var(--surface);
  border-color: var(--border);
  color: var(--text);
}

.btn-danger {
  border-color: rgba(248,113,113,0.3);
  color: var(--danger);
}
.btn-danger:hover {
  background: rgba(248,113,113,0.08);
  border-color: rgba(248,113,113,0.5);
}

.btn-full { width: 100%; }

/* ── DIVIDER ── */
.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 20px 0;
  color: var(--muted);
  font-size: 12px;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── PROFILE VIEW ── */
.profile-avatar {
  width: 88px;
  height: 88px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid var(--border);
  margin-bottom: 12px;
  display: block;
  margin-left: auto;
  margin-right: auto;
}
.profile-name {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 26px;
  margin-bottom: 6px;
}
.profile-bio {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.6;
  margin-bottom: 24px;
}
.profile-links { display: flex; flex-direction: column; gap: 8px; }
.profile-links a {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  text-decoration: none;
  color: var(--text);
  font-size: 14px;
  font-weight: 500;
  transition: all 0.18s ease;
}
.profile-links a:hover {
  background: var(--surface-hover);
  border-color: var(--border-hover);
  transform: translateX(4px);
}
.profile-links a i { width: 18px; text-align: center; color: var(--muted); }

/* ── EDITOR LINK ROW ── */
.link-row {
  display: flex;
  gap: 6px;
  align-items: center;
  margin: 4px 0;
  animation: fadeSlideIn 0.2s ease both;
}
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.link-row input { margin: 0; flex: 1; }
.link-row .remove-btn {
  flex-shrink: 0;
  width: 32px;
  height: 32px;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  background: transparent;
  border: 1px solid transparent;
  color: var(--muted);
  cursor: pointer;
  font-size: 14px;
  transition: all 0.15s;
}
.link-row .remove-btn:hover { background: rgba(248,113,113,0.1); border-color: rgba(248,113,113,0.3); color: var(--danger); }

/* ── UPLOAD ZONE ── */
.upload-zone {
  border: 1.5px dashed var(--border);
  padding: 16px;
  border-radius: var(--radius-sm);
  margin: 4px 0;
  cursor: pointer;
  text-align: center;
  font-size: 13px;
  color: var(--muted);
  transition: all 0.18s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.upload-zone:hover { border-color: var(--border-hover); color: var(--text); background: var(--surface); }

/* ── AVATAR PREVIEW ── */
.avatar-preview {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--border);
  display: none;
  margin: 8px auto 0;
}

/* ── HINT ── */
.hint {
  font-size: 12px;
  min-height: 18px;
  margin: 3px 0 6px;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: color 0.2s;
}
.hint.err { color: var(--danger); }
.hint.ok  { color: var(--success); }
.hint.muted { color: var(--muted); }

/* ── STATUS / TOAST ── */
.status {
  font-size: 13px;
  min-height: 20px;
  margin-top: 8px;
  text-align: center;
  transition: opacity 0.3s;
}
.status.ok  { color: var(--success); }
.status.err { color: var(--danger); }

/* ── HEADER ROW ── */
.header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

/* ── YOUR PAGE PILL ── */
.page-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 5px 12px 5px 8px;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 20px;
  cursor: pointer;
  transition: all 0.18s;
  text-decoration: none;
}
.page-pill:hover { border-color: var(--border-hover); color: var(--text); }
.page-pill i { font-size: 10px; }

/* ── THEME SWATCHES ── */
.theme-grid {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin: 4px 0 8px;
}
.theme-swatch {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition: transform 0.15s, border-color 0.15s;
  outline: none;
}
.theme-swatch:hover { transform: scale(1.15); }
.theme-swatch.active { border-color: #fff; transform: scale(1.1); }

/* ── THEMES ── */
.theme-default { color: var(--text); }
.theme-purple  { color: #c084fc; }
.theme-blue    { color: #38bdf8; }
.theme-red     { color: #f87171; }
.theme-green   { color: #4ade80; }
.theme-gold    { color: #facc15; }

/* ── FOOTER ── */
footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 14px 20px;
  background: linear-gradient(to top, rgba(8,8,16,0.95) 60%, transparent);
  gap: 12px;
}
.footer-discord {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 18px;
  background: rgba(88,101,242,0.12);
  border: 1px solid rgba(88,101,242,0.3);
  border-radius: 100px;
  color: #a5b4fc;
  font-size: 13px;
  font-weight: 500;
  text-decoration: none;
  transition: all 0.18s;
  font-family: 'DM Sans', sans-serif;
}
.footer-discord:hover {
  background: rgba(88,101,242,0.22);
  border-color: rgba(88,101,242,0.55);
  color: #c7d2fe;
  transform: translateY(-1px);
}
.footer-discord svg { width: 16px; height: 16px; }
.footer-copy {
  font-size: 11px;
  color: rgba(240,240,245,0.2);
}

/* ── SPINNER ── */
.spinner {
  width: 18px; height: 18px;
  border: 2px solid rgba(255,255,255,0.15);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── CLAIM SCREEN ── */
.claim-icon {
  font-size: 36px;
  margin-bottom: 12px;
}
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div id="root">
  <div class="card" id="app">
    <div style="display:flex;align-items:center;justify-content:center;gap:10px;padding:20px 0">
      <div class="spinner"></div>
    </div>
  </div>
</div>

<footer>
  <a class="footer-discord" href="https://discord.gg/aq3THnu5wC" target="_blank" rel="noopener noreferrer">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.033.056a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
    Join the Discord
  </a>
  <span class="footer-copy">© 2025 biolnk</span>
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, doc, setDoc, getDoc,
  collection, query, where, getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* ── FIREBASE ── */
let db;
try {
  db = getFirestore(initializeApp({
    apiKey: "AIzaSyCsWG4bQeRA8SvR6BQKu-l4DGsfk22iqHg",
    authDomain: "bluesharklethal.firebaseapp.com",
    projectId: "bluesharklethal"
  }));
} catch(e) {
  document.getElementById("app").innerHTML = "<p style='color:var(--danger);text-align:center'>firebase failed to load.</p>";
  throw e;
}

const app = document.getElementById("app");

/* ── SANITIZER ── */
function sanitize(str) {
  return String(str ?? "")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#x27;");
}

/* ── AUTH ── */
let user = null;
try { user = JSON.parse(localStorage.getItem("discordUser") || "null"); }
catch(e) { localStorage.removeItem("discordUser"); }

window.loginDiscord = () => {
  const popup = window.open("https://biolnk.snutdddee.workers.dev/login","discord","width=500,height=700");
  if (!popup) { alert("Pop-up blocked — allow pop-ups and try again."); return; }
  window.addEventListener("message", async (e) => {
    if (!e.data?.id) return;
    user = e.data;
    localStorage.setItem("discordUser", JSON.stringify(user));
    await afterLogin();
  });
};

window.logout = () => {
  localStorage.removeItem("discordUser");
  user = null;
  location.hash = "";
  showLogin();
};

/* ── AFTER LOGIN ── */
async function afterLogin() {
  app.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;padding:32px"><div class="spinner"></div></div>`;
  try {
    const snap = await getDoc(doc(db,"users",user.id));
    if (snap.exists() && snap.data().username) loadEditor(snap.data().username);
    else showClaim();
  } catch(e) {
    console.error(e);
    app.innerHTML = "<p style='color:var(--danger);text-align:center'>something went wrong. try refreshing.</p>";
  }
}

/* ── ROUTING ── */
const route = location.hash.replace("#/","").toLowerCase().trim();

/* ── ICON HELPER ── */
function icon(url) {
  if (!url) return "fa-solid fa-link";
  if (url.includes("github"))    return "fa-brands fa-github";
  if (url.includes("discord"))   return "fa-brands fa-discord";
  if (url.includes("youtube"))   return "fa-brands fa-youtube";
  if (url.includes("twitter") || url.includes("x.com")) return "fa-brands fa-x-twitter";
  if (url.includes("instagram")) return "fa-brands fa-instagram";
  if (url.includes("twitch"))    return "fa-brands fa-twitch";
  if (url.includes("tiktok"))    return "fa-brands fa-tiktok";
  if (url.includes("linkedin"))  return "fa-brands fa-linkedin";
  if (url.includes("spotify"))   return "fa-brands fa-spotify";
  return "fa-solid fa-link";
}

/* ── STARS ── */
function stars() {
  const c = document.getElementById("bg");
  const ctx = c.getContext("2d");
  function resize() { c.width=innerWidth; c.height=innerHeight; }
  resize();
  addEventListener("resize", resize);
  const s = Array.from({length:90}, () => ({
    x: Math.random()*innerWidth,
    y: Math.random()*innerHeight,
    r: Math.random()*1.2+0.2,
    v: Math.random()*0.3+0.05,
    o: Math.random()*0.6+0.2
  }));
  function loop() {
    ctx.clearRect(0,0,c.width,c.height);
    s.forEach(star => {
      star.y += star.v;
      if (star.y > c.height) { star.y=0; star.x=Math.random()*c.width; }
      ctx.beginPath();
      ctx.arc(star.x, star.y, star.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(200,205,255,${star.o})`;
      ctx.fill();
    });
    requestAnimationFrame(loop);
  }
  loop();
}
stars();

/* ── THEME CONFIG ── */
const themes = [
  { id:"",        color:"#f0f0f5", label:"Default" },
  { id:"theme-purple", color:"#c084fc", label:"Purple" },
  { id:"theme-blue",   color:"#38bdf8", label:"Blue" },
  { id:"theme-red",    color:"#f87171", label:"Red" },
  { id:"theme-green",  color:"#4ade80", label:"Green" },
  { id:"theme-gold",   color:"#facc15", label:"Gold" },
];

/* ── DISCORD SVG ── */
const discordSVG = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.033.056a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>`;

/* ── LOGIN ── */
function showLogin() {
  app.innerHTML = `
    <div style="text-align:center;margin-bottom:28px">
      <div class="wordmark">bio<span>lnk</span></div>
      <div class="tagline">your link in bio, elevated</div>
    </div>
    <button class="btn btn-discord" onclick="loginDiscord()">
      ${discordSVG}
      Continue with Discord
    </button>
    <div class="divider">or</div>
    <p style="font-size:13px;color:var(--muted);text-align:center;line-height:1.6">
      Sign in with your Discord account to create<br>your personalised biolnk page.
    </p>`;
}

/* ── CLAIM ── */
function showClaim() {
  app.innerHTML = `
    <div style="text-align:center;margin-bottom:24px">
      <div style="font-size:32px;margin-bottom:8px">✦</div>
      <div class="wordmark" style="font-size:22px">claim your username</div>
      <p style="font-size:13px;color:var(--muted);margin-top:6px">this is permanent — choose wisely.</p>
    </div>
    <input id="claim-input" placeholder="yourname" maxlength="32" autocomplete="off" spellcheck="false" style="text-align:center;font-size:16px;letter-spacing:0.02em">
    <p class="hint muted" id="claim-hint" style="justify-content:center"></p>
    <button class="btn btn-primary btn-full" id="claim-btn" disabled style="margin-top:12px">
      Claim username
    </button>
    <p class="status" id="claim-out"></p>`;

  const input=document.getElementById("claim-input"), hint=document.getElementById("claim-hint"),
        btn=document.getElementById("claim-btn"), out=document.getElementById("claim-out");
  let timer=null, lastChecked="", isAvailable=false;
  const valid = v => /^[a-z0-9_-]{3,32}$/.test(v);

  input.addEventListener("input", () => {
    const val = input.value.toLowerCase().replace(/[^a-z0-9_-]/g,"");
    input.value = val;
    btn.disabled=true; isAvailable=false;
    clearTimeout(timer);
    if (!val) { hint.textContent=""; hint.className="hint muted"; input.className=""; return; }
    if (!valid(val)) {
      hint.innerHTML=`<i class="fa-solid fa-circle-xmark"></i> 3–32 chars, letters/numbers/_ only`;
      hint.className="hint err"; input.className="error"; return;
    }
    hint.innerHTML=`<div class="spinner" style="width:12px;height:12px;border-width:1.5px"></div> checking...`;
    hint.className="hint muted"; input.className="";
    timer = setTimeout(async () => {
      if (val !== input.value) return;
      lastChecked = val;
      try {
        const res = await getDocs(query(collection(db,"users"), where("username","==",val)));
        if (val !== lastChecked) return;
        if (res.empty) {
          hint.innerHTML=`<i class="fa-solid fa-circle-check"></i> ${val} is available`;
          hint.className="hint ok"; input.className="ok"; isAvailable=true; btn.disabled=false;
        } else {
          hint.innerHTML=`<i class="fa-solid fa-circle-xmark"></i> ${val} is taken`;
          hint.className="hint err"; input.className="error"; isAvailable=false;
        }
      } catch { hint.innerHTML=`<i class="fa-solid fa-triangle-exclamation"></i> couldn't check`; hint.className="hint err"; }
    }, 500);
  });

  btn.onclick = async () => {
    const val = input.value.toLowerCase().trim();
    if (!isAvailable || !valid(val)) return;
    btn.disabled=true;
    btn.innerHTML=`<div class="spinner"></div> Claiming...`;
    try {
      const res = await getDocs(query(collection(db,"users"), where("username","==",val)));
      if (!res.empty) {
        hint.innerHTML=`<i class="fa-solid fa-circle-xmark"></i> just taken — try another`;
        hint.className="hint err"; input.className="error"; isAvailable=false;
        btn.innerHTML="Claim username"; btn.disabled=false; return;
      }
      await setDoc(doc(db,"users",user.id), {username:val,bio:"",theme:"",pfp:"",ownerId:user.id,links:[]});
      out.textContent="✔ claimed!"; out.className="status ok";
      setTimeout(() => loadEditor(val), 700);
    } catch(e) {
      console.error(e); out.textContent="something went wrong ❌"; out.className="status err";
      btn.innerHTML="Claim username"; btn.disabled=false;
    }
  };
}

/* ── PROFILE VIEW ── */
async function loadProfile(name) {
  try {
    const res = await getDocs(query(collection(db,"users"), where("username","==",name)));
    if (res.empty) {
      app.innerHTML=`<div style="text-align:center;padding:20px 0"><div class="wordmark">bio<span>lnk</span></div><p style="margin-top:16px;color:var(--muted)">user not found</p><a href="#" class="btn btn-sm" style="margin-top:16px;text-decoration:none" onclick="location.hash='';location.reload()">← home</a></div>`;
      return;
    }
    const d = res.docs[0].data();
    app.innerHTML = `
      ${d.pfp ? `<img class="profile-avatar" src="${sanitize(d.pfp)}" alt="avatar">` : `<div style="width:88px;height:88px;border-radius:50%;background:var(--surface);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:32px">👤</div>`}
      <div class="profile-name ${sanitize(d.theme||"")}">${sanitize(d.username)}</div>
      ${d.bio ? `<div class="profile-bio">${sanitize(d.bio)}</div>` : ""}
      <div class="profile-links">
        ${(d.links||[]).filter(l=>l.url).map(l=>`
          <a href="${sanitize(l.url)}" target="_blank" rel="noopener noreferrer">
            <i class="${icon(l.url)}"></i> ${sanitize(l.title||l.url)}
          </a>`).join("")}
      </div>`;
  } catch(e) {
    console.error(e);
    app.innerHTML="<p style='color:var(--danger);text-align:center'>failed to load profile.</p>";
  }
}

/* ── EDITOR ── */
function loadEditor(username) {
  let selectedTheme = "";

  app.innerHTML = `
    <div class="header-row">
      <div class="wordmark" style="font-size:20px">bio<span>lnk</span></div>
      <button class="btn btn-ghost btn-sm btn-danger" onclick="logout()">
        <i class="fa-solid fa-arrow-right-from-bracket"></i> logout
      </button>
    </div>

    <a class="page-pill" href="#/${sanitize(username)}" onclick="loadProfileView(event,'${sanitize(username)}')">
      <i class="fa-solid fa-arrow-up-right-from-square"></i>
      biolnk/#/${sanitize(username)}
    </a>

    <div class="section-label">profile picture</div>
    <div class="upload-zone" id="upload">
      <i class="fa-solid fa-image"></i>
      <span id="upload-label">click to upload</span>
    </div>
    <img id="preview" class="avatar-preview" alt="preview">

    <div class="section-label">bio</div>
    <input id="bio" placeholder="tell the world a little about you…" maxlength="160">

    <div class="section-label">theme colour</div>
    <div class="theme-grid" id="theme-grid">
      ${themes.map(t=>`
        <div class="theme-swatch${t.id===""?" active":""}"
          style="background:${t.color}"
          data-theme="${t.id}"
          title="${t.label}"
          tabindex="0">
        </div>`).join("")}
    </div>
    <input type="hidden" id="theme" value="">

    <div class="section-label" style="margin-top:20px">links</div>
    <div id="links"></div>
    <button class="btn btn-sm btn-full" id="add" style="margin-top:6px">
      <i class="fa-solid fa-plus"></i> add link
    </button>

    <button class="btn btn-primary btn-full" id="save" style="margin-top:20px">
      Save changes
    </button>
    <p class="status" id="out"></p>`;

  const bioEl=document.getElementById("bio"), themeEl=document.getElementById("theme"),
        linksEl=document.getElementById("links"), uploadEl=document.getElementById("upload"),
        previewEl=document.getElementById("preview"), outEl=document.getElementById("out"),
        uploadLabel=document.getElementById("upload-label");

  let file=null;

  /* theme swatches */
  document.getElementById("theme-grid").addEventListener("click", e => {
    const sw = e.target.closest(".theme-swatch");
    if (!sw) return;
    document.querySelectorAll(".theme-swatch").forEach(s=>s.classList.remove("active"));
    sw.classList.add("active");
    themeEl.value = sw.dataset.theme;
    selectedTheme = sw.dataset.theme;
  });

  /* prefill */
  getDoc(doc(db,"users",user.id)).then(snap => {
    if (!snap.exists()) return;
    const d=snap.data();
    bioEl.value=d.bio||""; themeEl.value=d.theme||""; selectedTheme=d.theme||"";
    if (d.pfp) { previewEl.src=d.pfp; previewEl.style.display="block"; uploadLabel.textContent="change picture"; }
    document.querySelectorAll(".theme-swatch").forEach(s=>{
      s.classList.toggle("active", s.dataset.theme===(d.theme||""));
    });
    (d.links||[]).forEach(l => addLinkRow(l.title||"", l.url||""));
  }).catch(e=>console.error("prefill:",e));

  /* upload */
  uploadEl.onclick = () => {
    const i=document.createElement("input"); i.type="file"; i.accept="image/*";
    i.onchange=e=>{
      file=e.target.files[0];
      const fr=new FileReader();
      fr.onload=ev=>{
        previewEl.src=ev.target.result; previewEl.style.display="block";
        uploadLabel.textContent="change picture";
      };
      fr.readAsDataURL(file);
    };
    i.click();
  };

  /* add link */
  function addLinkRow(title="", url="") {
    const r=document.createElement("div"); r.className="link-row";
    r.innerHTML=`
      <input placeholder="label" value="${sanitize(title)}" style="flex:0.8">
      <input placeholder="https://…" value="${sanitize(url)}" style="flex:1.2">
      <button class="remove-btn" title="remove"><i class="fa-solid fa-xmark"></i></button>`;
    r.querySelector(".remove-btn").onclick=()=>{ r.style.opacity="0"; r.style.transform="translateX(8px)"; r.style.transition="all 0.15s"; setTimeout(()=>r.remove(),150); };
    linksEl.appendChild(r);
  }

  document.getElementById("add").onclick = () => addLinkRow();

  /* save */
  document.getElementById("save").onclick = async () => {
    const saveBtn=document.getElementById("save");
    saveBtn.disabled=true; saveBtn.innerHTML=`<div class="spinner"></div> Saving…`;
    outEl.textContent=""; outEl.className="status";
    try {
      const existing=await getDoc(doc(db,"users",user.id));
      if (existing.exists() && existing.data().ownerId!==user.id) {
        outEl.textContent="not authorised ❌"; outEl.className="status err";
        saveBtn.disabled=false; saveBtn.innerHTML="Save changes"; return;
      }
      let img=existing.exists()?(existing.data().pfp||""):"";
      if (file) { img=await new Promise(r=>{const fr=new FileReader();fr.onload=e=>r(e.target.result);fr.readAsDataURL(file);}); }
      const links=[...linksEl.querySelectorAll(".link-row")].map(r=>({
        title:r.children[0].value.trim(), url:r.children[1].value.trim()
      })).filter(l=>l.url);
      await setDoc(doc(db,"users",user.id),{
        username,bio:bioEl.value,theme:themeEl.value,pfp:img,ownerId:user.id,links
      });
      outEl.textContent="✔ saved!"; outEl.className="status ok";
      setTimeout(()=>{outEl.textContent="";outEl.className="status";},2500);
      location.hash="#/"+username;
    } catch(e) {
      console.error(e); outEl.textContent="save failed ❌"; outEl.className="status err";
    } finally {
      saveBtn.disabled=false; saveBtn.innerHTML="Save changes";
    }
  };

  /* pill opens profile in same page */
  window.loadProfileView = (e, name) => {
    e.preventDefault();
    location.hash="#/"+name;
    loadProfile(name);
  };
}

/* ── START ── */
(async function start() {
  try {
    if (route) await loadProfile(route);
    else if (user) await afterLogin();
    else showLogin();
  } catch(e) {
    console.error(e);
    app.innerHTML="<p style='color:var(--danger);text-align:center'>something went wrong.</p>";
  }
})();
</script>
