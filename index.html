<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>biolnk</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Space Grotesk',sans-serif;
  background:#000;
  color:#fff;
  overflow:hidden;
}

/* cursor glow */
.cursor{
  position:fixed;
  width:180px;height:180px;
  background:radial-gradient(circle,rgba(255,255,255,0.15),transparent);
  pointer-events:none;
  transform:translate(-50%,-50%);
  z-index:1;
}

/* canvas */
canvas{position:fixed;top:0;left:0;z-index:0}

/* center card */
.center{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  width:90%;max-width:420px;
  padding:20px;
  border-radius:20px;
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.1);
  z-index:2;
  animation:fadeIn .8s ease;
}

/* animations */
@keyframes fadeIn{
  from{opacity:0;transform:translate(-50%,-60%)}
  to{opacity:1;transform:translate(-50%,-50%)}
}
@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
  100%{transform:translateY(0)}
}

h1{
  font-size:46px;
  animation:float 4s ease-in-out infinite;
  background:linear-gradient(90deg,#fff,#aaa,#fff);
  -webkit-background-clip:text;
  color:transparent;
}

input,select{
  width:100%;
  padding:10px;
  margin:6px 0;
  background:#111;
  border:1px solid #333;
  color:#fff;
  border-radius:8px;
}

/* buttons */
button{
  margin-top:10px;
  padding:10px 20px;
  border-radius:20px;
  border:1px solid #fff;
  background:transparent;
  color:#fff;
  cursor:pointer;
  transition:.2s;
}
button:hover{
  background:#fff;
  color:#000;
  transform:scale(1.08);
  box-shadow:0 0 20px #fff;
}

/* links */
.links a{
  display:block;
  margin:10px auto;
  padding:12px;
  border-radius:20px;
  text-decoration:none;
  color:#fff;
  width:240px;
  border:1px solid rgba(255,255,255,0.2);
  transition:.2s;
}
.links a:hover{
  transform:scale(1.08);
  background:#fff;
  color:#000;
  box-shadow:0 0 20px #fff;
}

.links i{margin-right:8px}

img{
  border-radius:50%;
  margin-bottom:10px;
  animation:float 5s ease-in-out infinite;
}

/* upload */
.upload{
  border:2px dashed #555;
  padding:20px;
  border-radius:12px;
  margin:10px 0;
  cursor:pointer;
}
.upload:hover{
  border-color:#fff;
  box-shadow:0 0 15px #fff;
}

.theme-purple{color:#c084fc}
.theme-blue{color:#38bdf8}
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<canvas id="bg"></canvas>
<div class="center" id="app"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCsWG4bQeRA8SvR6BQKu-l4DGsfk22iqHg",
  authDomain: "bluesharklethal.firebaseapp.com",
  projectId: "bluesharklethal",
};

const db = getFirestore(initializeApp(firebaseConfig));
const app = document.getElementById("app");

// cursor glow
const cursor = document.getElementById("cursor");
document.addEventListener("mousemove", e=>{
  cursor.style.left=e.clientX+"px";
  cursor.style.top=e.clientY+"px";
});

// icons
function icon(url){
  if(url.includes("github")) return "fa-brands fa-github";
  if(url.includes("discord")) return "fa-brands fa-discord";
  if(url.includes("youtube")) return "fa-brands fa-youtube";
  return "fa-solid fa-link";
}

// ⭐ STARS BACKGROUND
function stars(){
  const c=document.getElementById('bg');
  const ctx=c.getContext('2d');

  function resize(){c.width=innerWidth;c.height=innerHeight}
  resize();addEventListener('resize',resize);

  let stars=Array.from({length:120},()=>({
    x:Math.random()*c.width,
    y:Math.random()*c.height,
    r:Math.random()*1.5,
    v:Math.random()*0.3
  }));

  function loop(){
    ctx.fillStyle="black";
    ctx.fillRect(0,0,c.width,c.height);

    stars.forEach(s=>{
      s.y+=s.v;
      if(s.y>c.height){s.y=0;s.x=Math.random()*c.width;}

      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle="white";
      ctx.fill();
    });

    requestAnimationFrame(loop);
  }
  loop();
}

// image compress
function resizeToBase64(file){
  return new Promise(resolve=>{
    const img=new Image();
    const reader=new FileReader();
    reader.onload=e=>img.src=e.target.result;

    img.onload=()=>{
      const canvas=document.createElement("canvas");
      const max=200;
      let w=img.width,h=img.height;

      if(w>h&&w>max){h*=max/w;w=max}
      if(h>w&&h>max){w*=max/h;h=max}

      canvas.width=w;canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);

      resolve(canvas.toDataURL("image/jpeg",0.6));
    };

    reader.readAsDataURL(file);
  });
}

// routing
const username = location.hash.replace("#/","");

// VIEW
if(username){
  const snap = await getDoc(doc(db,"users",username));

  if(!snap.exists()){
    app.innerHTML="<h1>user not found</h1>";
  } else {
    const d=snap.data();
    document.body.className=d.theme||"";

    app.innerHTML=`
      ${d.pfp?`<img src="${d.pfp}" width="100">`:""}
      <h1>${username}</h1>
      <p>${d.bio||""}</p>
      <div class="links">
        ${d.links.map(l=>`
          <a href="${l.url}" target="_blank">
            <i class="${icon(l.url)}"></i> ${l.title}
          </a>`).join("")}
      </div>
    `;
  }

} else {

// EDITOR
app.innerHTML=`
<h1>create</h1>

<input id="usernameInput" placeholder="username">
<input id="bio" placeholder="bio">

<div class="upload" id="uploadBox">
  drag & drop image or click
</div>

<img id="preview" width="80" style="display:none">

<select id="theme">
  <option value="">default</option>
  <option value="theme-purple">purple</option>
  <option value="theme-blue">blue</option>
</select>

<div id="links"></div>

<button onclick="addLink()">+ link</button>
<button onclick="saveProfile()">save</button>

<p id="out"></p>
`;

let uploadedFile=null;

uploadBox.onclick=()=>{
  const i=document.createElement("input");
  i.type="file";i.accept="image/*";
  i.onchange=e=>handleFile(e.target.files[0]);
  i.click();
};

uploadBox.ondragover=e=>e.preventDefault();
uploadBox.ondrop=e=>{
  e.preventDefault();
  handleFile(e.dataTransfer.files[0]);
};

function handleFile(file){
  uploadedFile=file;
  const r=new FileReader();
  r.onload=e=>{
    preview.src=e.target.result;
    preview.style.display="block";
  };
  r.readAsDataURL(file);
}

window.addLink=()=>{
  const d=document.createElement("div");
  d.innerHTML=`<input placeholder="title"><input placeholder="url">`;
  links.appendChild(d);
};

window.saveProfile=async ()=>{
  const username=usernameInput.value.trim();
  if(!username)return alert("enter username");

  let img="";
  if(uploadedFile){
    img=await resizeToBase64(uploadedFile);
  }

  const data={
    bio:bio.value,
    pfp:img,
    theme:theme.value,
    links:[...links.children].map(r=>{
      const t=r.children[0].value;
      const u=r.children[1].value;
      if(!t||!u)return null;
      return {title:t,url:u};
    }).filter(x=>x)
  };

  await setDoc(doc(db,"users",username),data);

  out.innerText=location.origin+location.pathname+"#/"+username;
};

}

// start stars
stars();
</script>

</body>
</html>
