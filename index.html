<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>biolnk</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Space Grotesk',sans-serif;
  background:#000;
  color:#fff;
  overflow:hidden;
}

/* splash */
#splash{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:#000;z-index:999;
  font-size:32px;
  animation:fadeOut 1s ease 1.5s forwards;
}
@keyframes fadeOut{to{opacity:0;visibility:hidden}}

/* cursor glow */
.cursor{
  position:fixed;
  width:200px;height:200px;
  background:radial-gradient(circle,rgba(255,255,255,0.15),transparent);
  pointer-events:none;
  transform:translate(-50%,-50%);
}

/* canvas */
canvas{position:fixed;top:0;left:0}

/* card */
.center{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  width:90%;max-width:420px;
  padding:25px;
  border-radius:24px;

  background:rgba(10,10,30,0.4);
  backdrop-filter:blur(20px);

  border:1px solid rgba(255,255,255,0.15);
  box-shadow:0 0 40px rgba(255,255,255,0.05);
}

h1{
  font-size:44px;
  text-shadow:
    0 0 10px #fff,
    0 0 20px #88ccff,
    0 0 40px #4488ff;
}

/* links */
.links a{
  display:block;margin:10px auto;padding:12px;
  border-radius:20px;text-decoration:none;
  color:#fff;width:240px;
  border:1px solid rgba(255,255,255,0.2);
  transition:.2s;
}
.links a:hover{
  transform:scale(1.08);
  background:#fff;color:#000;
}

input,select{
  width:100%;padding:10px;margin:6px 0;
  background:#111;border:1px solid #333;
  color:#fff;border-radius:8px;
}

button{
  margin-top:10px;padding:10px 20px;
  border-radius:20px;border:1px solid #fff;
  background:transparent;color:#fff;
  cursor:pointer;
}
button:hover{
  background:#fff;color:#000;
}

.upload{
  border:2px dashed #555;
  padding:20px;
  border-radius:12px;
  margin:10px 0;
}

.theme-space{
  color:#8ab4ff;
  text-shadow:0 0 12px #8ab4ff, 0 0 30px #4f7cff;
}
</style>
</head>
<body>

<div id="splash">biolnk</div>
<div class="cursor" id="cursor"></div>
<canvas id="bg"></canvas>
<div class="center" id="app"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const db = getFirestore(initializeApp({
  apiKey:"AIzaSyCsWG4bQeRA8SvR6BQKu-l4DGsfk22iqHg",
  authDomain:"bluesharklethal.firebaseapp.com",
  projectId:"bluesharklethal"
}));

const app = document.getElementById("app");
const cursor = document.getElementById("cursor");

let mouse={x:0,y:0};

// cursor
document.addEventListener("mousemove",e=>{
  mouse.x=e.clientX;
  mouse.y=e.clientY;
  cursor.style.left=e.clientX+"px";
  cursor.style.top=e.clientY+"px";
});

// parallax
document.addEventListener("mousemove",e=>{
  const x=(e.clientX/window.innerWidth-.5)*20;
  const y=(e.clientY/window.innerHeight-.5)*20;
  document.querySelector(".center").style.transform =
    `translate(-50%,-50%) rotateX(${-y}deg) rotateY(${x}deg)`;
});

// sounds
const ctxAudio = new (window.AudioContext||window.webkitAudioContext)();
function beep(freq){
  const o=ctxAudio.createOscillator();
  const g=ctxAudio.createGain();
  o.connect(g);g.connect(ctxAudio.destination);
  o.frequency.value=freq;
  o.start();
  g.gain.exponentialRampToValueAtTime(0.0001,ctxAudio.currentTime+0.1);
}
document.addEventListener("mouseover",()=>beep(200));
document.addEventListener("click",()=>beep(400));

// icons
function icon(url){
  if(url.includes("github")) return "fa-brands fa-github";
  if(url.includes("discord")) return "fa-brands fa-discord";
  return "fa-solid fa-link";
}

// 🌌 FINAL STAR SYSTEM
function stars(){
  const c=bg,ctx=c.getContext("2d");

  function resize(){
    c.width=innerWidth;
    c.height=innerHeight;
  }
  resize();
  addEventListener("resize",resize);

  let layers=[
    {count:80,speed:0.2,size:1},
    {count:50,speed:0.4,size:1.5},
    {count:30,speed:0.7,size:2}
  ];

  let stars=layers.flatMap(l=>
    Array.from({length:l.count},()=>({
      x:Math.random()*c.width,
      y:Math.random()*c.height,
      vx:(Math.random()-.5)*l.speed,
      vy:(Math.random()-.5)*l.speed,
      size:l.size,
      twinkle:Math.random()*Math.PI*2
    }))
  );

  let angle=0;

  function loop(){
    ctx.fillStyle="#000";
    ctx.fillRect(0,0,c.width,c.height);

    // galaxy swirl
    angle+=0.0005;
    ctx.save();
    ctx.translate(c.width/2,c.height/2);
    ctx.rotate(angle);

    const g=ctx.createRadialGradient(0,0,0,0,0,c.width*0.6);
    g.addColorStop(0,"rgba(180,180,255,0.15)");
    g.addColorStop(0.4,"rgba(120,120,255,0.08)");
    g.addColorStop(1,"transparent");

    ctx.fillStyle=g;
    ctx.fillRect(-c.width,-c.height,c.width*2,c.height*2);
    ctx.restore();

    // stars
    stars.forEach(a=>{
      a.x+=a.vx;
      a.y+=a.vy;

      if(a.x<0)a.x=c.width;
      if(a.x>c.width)a.x=0;
      if(a.y<0)a.y=c.height;
      if(a.y>c.height)a.y=0;

      const dx=mouse.x-a.x;
      const dy=mouse.y-a.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<120){
        a.x-=dx*0.002;
        a.y-=dy*0.002;
      }

      // twinkle
      a.twinkle+=0.05;
      const b=(Math.sin(a.twinkle)+1)/2;

      const glow=ctx.createRadialGradient(a.x,a.y,0,a.x,a.y,a.size*4);
      glow.addColorStop(0,`rgba(255,255,255,${0.6+b*0.4})`);
      glow.addColorStop(1,"transparent");

      ctx.fillStyle=glow;
      ctx.beginPath();
      ctx.arc(a.x,a.y,a.size*4,0,Math.PI*2);
      ctx.fill();

      ctx.fillStyle=`rgba(255,255,255,${0.7+b*0.3})`;
      ctx.beginPath();
      ctx.arc(a.x,a.y,a.size,0,Math.PI*2);
      ctx.fill();
    });

    // constellations
    for(let i=0;i<stars.length;i++){
      for(let j=i+1;j<stars.length;j++){
        const dx=stars[i].x-stars[j].x;
        const dy=stars[i].y-stars[j].y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<90){
          ctx.strokeStyle="rgba(255,255,255,"+(1-d/90)+")";
          ctx.beginPath();
          ctx.moveTo(stars[i].x,stars[i].y);
          ctx.lineTo(stars[j].x,stars[j].y);
          ctx.stroke();
        }
      }
    }

    // shooting stars
    if(Math.random()<0.004){
      ctx.strokeStyle="white";
      ctx.lineWidth=2;
      ctx.beginPath();
      let x=Math.random()*c.width;
      let y=Math.random()*c.height;
      ctx.moveTo(x,y);
      ctx.lineTo(x+120,y+40);
      ctx.stroke();
    }

    requestAnimationFrame(loop);
  }

  loop();
}

// typing
function typeText(el,text){
  el.innerHTML="";
  let i=0;
  function t(){
    if(i<text.length){
      el.innerHTML+=text[i++];
      setTimeout(t,20);
    }
  }
  t();
}

// image resize
function resizeToBase64(file){
  return new Promise(r=>{
    const img=new Image();
    const fr=new FileReader();
    fr.onload=e=>img.src=e.target.result;
    img.onload=()=>{
      const c=document.createElement("canvas");
      const max=200;
      let w=img.width,h=img.height;
      if(w>h&&w>max){h*=max/w;w=max}
      if(h>w&&h>max){w*=max/h;h=max}
      c.width=w;c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      r(c.toDataURL("image/jpeg",0.6));
    };
    fr.readAsDataURL(file);
  });
}

// routing
const user = location.hash.replace("#/","");

if(user){
  const snap=await getDoc(doc(db,"users",user));
  if(!snap.exists()){
    app.innerHTML="<h1>not found</h1>";
  }else{
    const d=snap.data();
    document.body.className=d.theme||"";

    app.innerHTML=`
      ${d.pfp?`<img src="${d.pfp}" width="100">`:""}
      <h1>${user}</h1>
      <p id="bio"></p>
      <div class="links">
        ${d.links.map(l=>`
          <a href="${l.url}" target="_blank">
            <i class="${icon(l.url)}"></i> ${l.title}
          </a>`).join("")}
      </div>
    `;

    typeText(document.getElementById("bio"), d.bio||"");
  }

}else{

app.innerHTML=`
<h1>create</h1>
<input id="usernameInput" placeholder="username">
<input id="bio" placeholder="bio">

<div class="upload" id="uploadBox">upload image</div>
<img id="preview" width="80" style="display:none">

<select id="theme">
<option value="">default</option>
<option value="theme-space">space</option>
</select>

<div id="links"></div>

<button onclick="addLink()">+ link</button>
<button onclick="saveProfile()">save</button>

<p id="out"></p>
`;

let file=null;

uploadBox.onclick=()=>{
  const i=document.createElement("input");
  i.type="file";i.accept="image/*";
  i.onchange=e=>handle(e.target.files[0]);
  i.click();
};

function handle(f){
  file=f;
  const r=new FileReader();
  r.onload=e=>{
    preview.src=e.target.result;
    preview.style.display="block";
  };
  r.readAsDataURL(f);
}

window.addLink=()=>{
  const d=document.createElement("div");
  d.innerHTML=`<input placeholder="title"><input placeholder="url">`;
  links.appendChild(d);
};

window.saveProfile=async()=>{
  const u=usernameInput.value.trim();
  if(!u)return alert("username");

  let img="";
  if(file) img=await resizeToBase64(file);

  await setDoc(doc(db,"users",u),{
    bio:bio.value,
    pfp:img,
    theme:theme.value,
    links:[...links.children].map(r=>{
      const t=r.children[0].value;
      const u=r.children[1].value;
      if(!t||!u)return null;
      return {title:t,url:u};
    }).filter(x=>x)
  });

  out.innerText=location.origin+location.pathname+"#/"+u;
};

}

stars();
</script>

</body>
</html>
