<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>biolnk</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Space Grotesk',sans-serif;
  background:#000;
  color:#fff;
}

.center{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:90%;
  max-width:420px;
  text-align:center;
  padding:20px;
  border-radius:16px;
  background:rgba(0,0,0,0.6);
  border:1px solid rgba(255,255,255,0.1);
}

input,select{
  width:100%;
  padding:10px;
  margin:6px 0;
  background:#111;
  border:1px solid #333;
  color:#fff;
}

button{
  margin-top:10px;
  padding:10px 16px;
  border:1px solid #fff;
  background:transparent;
  color:#fff;
  cursor:pointer;
}
button:hover{background:#fff;color:#000}

.upload{
  border:2px dashed #555;
  padding:14px;
  margin:10px 0;
  cursor:pointer;
}

img{border-radius:50%}

.theme-purple{color:#c084fc}
.theme-blue{color:#38bdf8}
.theme-red{color:#f87171}
.theme-green{color:#4ade80}
.theme-gold{color:#facc15}
</style>
</head>

<body>

<div class="center" id="app">loading...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const db = getFirestore(initializeApp({
  apiKey:"AIzaSyCsWG4bQeRA8SvR6BQKu-l4DGsfk22iqHg",
  authDomain:"bluesharklethal.firebaseapp.com",
  projectId:"bluesharklethal"
}));

const app = document.getElementById("app");

let user = JSON.parse(localStorage.getItem("discordUser") || "null");

/* =========================
   DISCORD LOGIN
========================= */
window.loginDiscord = () => {
  const popup = window.open(
    "https://biolnk.snutdddee.workers.dev/login",
    "discord",
    "width=500,height=700"
  );

  window.addEventListener("message", (e) => {
    if (!e.data?.id) return;

    user = e.data;
    localStorage.setItem("discordUser", JSON.stringify(user));

    loadEditor();
  });
};

/* =========================
   ROUTE
========================= */
const route = location.hash.replace("#/","").toLowerCase();

/* =========================
   LOAD PROFILE
========================= */
async function loadProfile(username){
  const snap = await getDoc(doc(db,"users",username));

  if(!snap.exists()){
    app.innerHTML = "<h1>not found</h1>";
    return;
  }

  const d = snap.data();

  app.innerHTML = `
    ${d.pfp ? `<img src="${d.pfp}" width="90">` : ""}
    <h1 class="${d.theme || ""}">${d.username}</h1>
    <p>${d.bio || ""}</p>

    <div>
      ${(d.links || []).map(l=>`
        <a href="${l.url}" target="_blank">${l.title}</a><br>
      `).join("")}
    </div>
  `;
}

/* =========================
   LOGIN SCREEN
========================= */
function showLogin(){
  app.innerHTML = `
    <h2>biolnk</h2>
    <button onclick="loginDiscord()">Login with Discord</button>
  `;
}

/* =========================
   EDITOR
========================= */
function loadEditor(){

  app.innerHTML = `
    <h2>editor</h2>
    <p>logged in as <b>${user.username}</b></p>

    <input id="username" placeholder="username">
    <input id="bio" placeholder="bio">

    <select id="theme">
      <option value="">default</option>
      <option value="theme-purple">purple</option>
      <option value="theme-blue">blue</option>
      <option value="theme-red">red</option>
      <option value="theme-green">green</option>
      <option value="theme-gold">gold</option>
    </select>

    <div class="upload" id="upload">upload image</div>
    <img id="preview" width="80" style="display:none">

    <div id="links"></div>

    <button id="add">+ link</button>
    <button id="save">save</button>

    <p id="out"></p>
  `;

  const username = document.getElementById("username");
  const bio = document.getElementById("bio");
  const theme = document.getElementById("theme");
  const links = document.getElementById("links");
  const preview = document.getElementById("preview");
  const upload = document.getElementById("upload");
  const out = document.getElementById("out");

  let file = null;

  /* LOAD EXISTING PROFILE */
  const uname = user.username.toLowerCase();

  getDoc(doc(db,"users",uname)).then(snap=>{
    if(snap.exists()){
      const d = snap.data();
      username.value = d.username || "";
      bio.value = d.bio || "";
      theme.value = d.theme || "";
    }
  });

  /* IMAGE UPLOAD */
  upload.onclick = () => {
    const i = document.createElement("input");
    i.type = "file";
    i.accept = "image/*";

    i.onchange = e => {
      file = e.target.files[0];

      const fr = new FileReader();
      fr.onload = ev => {
        preview.src = ev.target.result;
        preview.style.display = "block";
      };
      fr.readAsDataURL(file);
    };

    i.click();
  };

  /* LINKS */
  document.getElementById("add").onclick = () => {
    const r = document.createElement("div");
    r.innerHTML = `
      <input placeholder="title">
      <input placeholder="url">
    `;
    links.appendChild(r);
  };

  /* SAVE */
  document.getElementById("save").onclick = async () => {
    try {

      let img = "";

      if(file){
        img = await new Promise(r=>{
          const fr = new FileReader();
          fr.onload = e => r(e.target.result);
          fr.readAsDataURL(file);
        });
      }

      const uname = username.value.trim().toLowerCase();

      await setDoc(doc(db,"users",uname), {
        username: uname,
        bio: bio.value,
        theme: theme.value,
        pfp: img || "",
        ownerId: user.id, // security marker
        links: [...links.children].map(r=>({
          title:r.children[0].value,
          url:r.children[1].value
        }))
      });

      out.innerText = "saved ✔";

      location.hash = "#/" + uname;

    } catch(err){
      console.error(err);
      out.innerText = "save failed ❌ check console";
    }
  };
}

/* =========================
   START
========================= */
(async function start(){

  try{

    if(route){
      await loadProfile(route);
    } else {
      if(user){
        loadEditor();
      } else {
        showLogin();
      }
    }

  } catch(e){
    console.error(e);
    app.innerHTML = "app crashed ❌";
  }

})();
</script>

</body>
</html>
