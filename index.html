<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const db = getFirestore(initializeApp({
  apiKey:"AIzaSyCsWG4bQeRA8SvR6BQKu-l4DGsfk22iqHg",
  authDomain:"bluesharklethal.firebaseapp.com",
  projectId:"bluesharklethal"
}));

const app = document.getElementById("app");
const cursor = document.getElementById("cursor");

let mouse={x:0,y:0};

// cursor
document.addEventListener("mousemove",e=>{
  mouse.x=e.clientX;
  mouse.y=e.clientY;
  cursor.style.left=e.clientX+"px";
  cursor.style.top=e.clientY+"px";
});

// parallax
document.addEventListener("mousemove",e=>{
  const x=(e.clientX/window.innerWidth-.5)*20;
  const y=(e.clientY/window.innerHeight-.5)*20;
  document.querySelector(".center").style.transform =
    `translate(-50%,-50%) rotateX(${-y}deg) rotateY(${x}deg)`;
});

// safe helpers
function escapeHTML(str){
  return String(str).replace(/[&<>"']/g, c => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#39;"
  }[c]));
}

function safeURL(input){
  try{
    const url = new URL(input, location.origin);
    if(!["http:","https:"].includes(url.protocol)) return null;
    return url.href;
  }catch{
    return null;
  }
}

// typing effect (safe)
function typeText(el,text){
  el.textContent="";
  let i=0;
  function t(){
    if(i<text.length){
      el.textContent+=text[i++];
      setTimeout(t,20);
    }
  }
  t();
}

// image resize
function resizeToBase64(file){
  return new Promise(r=>{
    const img=new Image();
    const fr=new FileReader();
    fr.onload=e=>img.src=e.target.result;
    img.onload=()=>{
      const c=document.createElement("canvas");
      const max=200;
      let w=img.width,h=img.height;
      if(w>h&&w>max){h*=max/w;w=max}
      if(h>w&&h>max){w*=max/h;h=max}
      c.width=w;c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      r(c.toDataURL("image/jpeg",0.6));
    };
    fr.readAsDataURL(file);
  });
}

// routing
const user = location.hash.replace("#/","");

if(user){
  const snap=await getDoc(doc(db,"users",user));

  if(!snap.exists()){
    app.textContent="not found";
  }else{
    const d=snap.data();
    document.body.className=d.theme||"";

    app.innerHTML="";

    const container=document.createElement("div");

    if(d.pfp){
      const img=document.createElement("img");
      img.src=d.pfp;
      img.width=100;
      container.appendChild(img);
    }

    const name=document.createElement("h1");
    name.textContent=user;
    container.appendChild(name);

    const bioEl=document.createElement("p");
    container.appendChild(bioEl);

    const linksDiv=document.createElement("div");
    linksDiv.className="links";

    (d.links||[]).forEach(l=>{
      const safe = safeURL(l.url);
      if(!safe) return;

      const a=document.createElement("a");
      a.href=safe;
      a.target="_blank";
      a.rel="noopener noreferrer";

      const iconEl=document.createElement("i");
      iconEl.className = "fa-solid fa-link";

      a.appendChild(iconEl);
      a.appendChild(document.createTextNode(" "+l.title));

      linksDiv.appendChild(a);
    });

    container.appendChild(linksDiv);
    app.appendChild(container);

    typeText(bioEl, d.bio || "");
  }

}else{

app.innerHTML=`
<h1>create</h1>
<input id="usernameInput" placeholder="username">
<input id="bio" placeholder="bio">

<div class="upload" id="uploadBox">upload image</div>
<img id="preview" width="80" style="display:none">

<select id="theme">
<option value="">default</option>
<option value="theme-space">space</option>
</select>

<div id="links"></div>

<button onclick="addLink()">+ link</button>
<button onclick="saveProfile()">save</button>

<p id="out"></p>
`;

let file=null;

uploadBox.onclick=()=>{
  const i=document.createElement("input");
  i.type="file";i.accept="image/*";
  i.onchange=e=>handle(e.target.files[0]);
  i.click();
};

function handle(f){
  file=f;
  const r=new FileReader();
  r.onload=e=>{
    preview.src=e.target.result;
    preview.style.display="block";
  };
  r.readAsDataURL(f);
}

window.addLink=()=>{
  const d=document.createElement("div");
  d.innerHTML=`<input placeholder="title"><input placeholder="url">`;
  links.appendChild(d);
};

window.saveProfile=async()=>{
  const u=usernameInput.value.trim();
  if(!u)return alert("username");

  let img="";
  if(file) img=await resizeToBase64(file);

  await setDoc(doc(db,"users",u),{
    bio: escapeHTML(bio.value),
    pfp: img,
    theme: theme.value,
    links:[...links.children].map(r=>{
      const t = escapeHTML(r.children[0].value);
      const urlInput = r.children[1].value;
      const safe = safeURL(urlInput);
      if(!t || !safe) return null;
      return {title:t,url:safe};
    }).filter(x=>x)
  });

  out.textContent=location.origin+location.pathname+"#/"+u;
};

}

// keep your stars()
stars();
</script>
