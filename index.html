<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>biolnk</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Space Grotesk',sans-serif;
  background:#000;
  color:#fff;
  overflow:hidden;
}

/* splash */
#splash{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:#000;z-index:999;
  font-size:32px;
  animation:fadeOut 1s ease 1.5s forwards;
}
@keyframes fadeOut{to{opacity:0;visibility:hidden}}

/* cursor glow */
.cursor{
  position:fixed;
  width:200px;height:200px;
  background:radial-gradient(circle,rgba(255,255,255,0.15),transparent);
  pointer-events:none;
  transform:translate(-50%,-50%);
}

/* canvas */
canvas{position:fixed;top:0;left:0}

/* card */
.center{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  width:90%;max-width:420px;
  padding:25px;
  border-radius:24px;

  background:rgba(10,10,30,0.4);
  backdrop-filter:blur(20px);

  border:1px solid rgba(255,255,255,0.15);
  box-shadow:0 0 40px rgba(255,255,255,0.05);

  transition:transform .1s;
}

h1{
  font-size:44px;
  text-shadow:
    0 0 10px #fff,
    0 0 20px #88ccff,
    0 0 40px #4488ff;
}

/* links */
.links a{
  display:block;margin:10px auto;padding:12px;
  border-radius:20px;text-decoration:none;
  color:#fff;width:240px;
  border:1px solid rgba(255,255,255,0.2);
  transition:.2s;
}
.links a:hover{
  transform:scale(1.08);
  background:#fff;color:#000;
}

/* inputs */
input,select{
  width:100%;padding:10px;margin:6px 0;
  background:#111;border:1px solid #333;
  color:#fff;border-radius:8px;
}

button{
  margin-top:10px;padding:10px 20px;
  border-radius:20px;border:1px solid #fff;
  background:transparent;color:#fff;
  cursor:pointer;transition:.2s;
}
button:hover{
  background:#fff;color:#000;
  transform:scale(1.08);
}

.upload{
  border:2px dashed #555;
  padding:20px;
  border-radius:12px;
  margin:10px 0;
}

/* themes */
.theme-space{
  color:#8ab4ff;
  text-shadow:0 0 12px #8ab4ff, 0 0 30px #4f7cff;
}
</style>
</head>
<body>

<div id="splash">biolnk</div>
<div class="cursor" id="cursor"></div>
<canvas id="bg"></canvas>
<div class="center" id="app"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const db = getFirestore(initializeApp({
  apiKey:"AIzaSyCsWG4bQeRA8SvR6BQKu-l4DGsfk22iqHg",
  authDomain:"bluesharklethal.firebaseapp.com",
  projectId:"bluesharklethal"
}));

const app = document.getElementById("app");
const cursor = document.getElementById("cursor");

// cursor
document.addEventListener("mousemove",e=>{
  cursor.style.left=e.clientX+"px";
  cursor.style.top=e.clientY+"px";
});

// parallax
document.addEventListener("mousemove",e=>{
  const x=(e.clientX/window.innerWidth-.5)*20;
  const y=(e.clientY/window.innerHeight-.5)*20;
  document.querySelector(".center").style.transform =
    `translate(-50%,-50%) rotateX(${-y}deg) rotateY(${x}deg)`;
});

// sounds
const ctx = new (window.AudioContext||window.webkitAudioContext)();
function beep(freq){
  const o=ctx.createOscillator();
  const g=ctx.createGain();
  o.connect(g);g.connect(ctx.destination);
  o.frequency.value=freq;
  o.start();
  g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.1);
}

document.addEventListener("mouseover",()=>beep(200));
document.addEventListener("click",()=>beep(400));

// icons
function icon(url){
  if(url.includes("github")) return "fa-brands fa-github";
  if(url.includes("discord")) return "fa-brands fa-discord";
  return "fa-solid fa-link";
}

// 🌌 stars + planets
function stars(){
  const c=bg,ctx=c.getContext("2d");

  function resize(){
    c.width=innerWidth;
    c.height=innerHeight;
  }
  resize();
  addEventListener("resize",resize);

  let stars=Array.from({length:120},()=>({
    x:Math.random()*c.width,
    y:Math.random()*c.height,
    r:Math.random()*1.5,
    vx:(Math.random()-.5)*0.1,
    vy:(Math.random()-.5)*0.1
  }));

  let planets=Array.from({length:4},(_,i)=>({
    x:Math.random()*c.width,
    y:Math.random()*c.height,
    r:20+Math.random()*30,
    angle:Math.random()*Math.PI*2,
    speed:0.002+(i*0.001),
    orbit:40+Math.random()*80,
    color:`hsl(${Math.random()*360},70%,60%)`
  }));

  function loop(){
    ctx.fillStyle="#000";
    ctx.fillRect(0,0,c.width,c.height);

    // stars
    stars.forEach(a=>{
      a.x+=a.vx;
      a.y+=a.vy;
      if(a.x<0||a.x>c.width)a.vx*=-1;
      if(a.y<0||a.y>c.height)a.vy*=-1;

      ctx.beginPath();
      ctx.arc(a.x,a.y,a.r,0,Math.PI*2);
      ctx.fillStyle="white";
      ctx.fill();
    });

    // constellations
    stars.forEach(a=>{
      stars.forEach(b=>{
        const dx=a.x-b.x,dy=a.y-b.y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<100){
          ctx.strokeStyle="rgba(255,255,255,"+(1-d/100)+")";
          ctx.beginPath();
          ctx.moveTo(a.x,a.y);
          ctx.lineTo(b.x,b.y);
          ctx.stroke();
        }
      });
    });

    // planets
    planets.forEach(p=>{
      p.angle+=p.speed;
      let px=p.x+Math.cos(p.angle)*p.orbit;
      let py=p.y+Math.sin(p.angle)*p.orbit;

      const g=ctx.createRadialGradient(px,py,0,px,py,p.r*2);
      g.addColorStop(0,p.color);
      g.addColorStop(1,"transparent");

      ctx.fillStyle=g;
      ctx.beginPath();
      ctx.arc(px,py,p.r*2,0,Math.PI*2);
      ctx.fill();

      ctx.fillStyle=p.color;
      ctx.beginPath();
      ctx.arc(px,py,p.r,0,Math.PI*2);
      ctx.fill();
    });

    // shooting stars
    if(Math.random()<0.003){
      ctx.strokeStyle="white";
      ctx.beginPath();
      let x=Math.random()*c.width;
      let y=Math.random()*c.height;
      ctx.moveTo(x,y);
      ctx.lineTo(x+80,y+20);
      ctx.stroke();
    }

    requestAnimationFrame(loop);
  }

  loop();
}

// typing
function typeText(el,text){
  el.innerHTML="";
  let i=0;
  function t(){
    if(i<text.length){
      el.innerHTML+=text[i++];
      setTimeout(t,20);
    }
  }
  t();
}

// image resize
function resizeToBase64(file){
  return new Promise(r=>{
    const img=new Image();
    const fr=new FileReader();
    fr.onload=e=>img.src=e.target.result;
    img.onload=()=>{
      const c=document.createElement("canvas");
      const max=200;
      let w=img.width,h=img.height;
      if(w>h&&w>max){h*=max/w;w=max}
      if(h>w&&h>max){w*=max/h;h=max}
      c.width=w;c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      r(c.toDataURL("image/jpeg",0.6));
    };
    fr.readAsDataURL(file);
  });
}

// routing
const user = location.hash.replace("#/","");

if(user){
  const snap=await getDoc(doc(db,"users",user));
  if(!snap.exists()){
    app.innerHTML="<h1>not found</h1>";
  }else{
    const d=snap.data();
    document.body.className=d.theme||"";

    app.innerHTML=`
      ${d.pfp?`<img src="${d.pfp}" width="100">`:""}
      <h1>${user}</h1>
      <p id="bio"></p>
      <div class="links">
        ${d.links.map(l=>`
          <a href="${l.url}" target="_blank">
            <i class="${icon(l.url)}"></i> ${l.title}
          </a>`).join("")}
      </div>
    `;

    typeText(document.getElementById("bio"), d.bio||"");
  }

}else{

app.innerHTML=`
<h1>create</h1>
<input id="usernameInput" placeholder="username">
<input id="bio" placeholder="bio">

<div class="upload" id="uploadBox">upload image</div>
<img id="preview" width="80" style="display:none">

<select id="theme">
<option value="">default</option>
<option value="theme-space">space</option>
</select>

<div id="links"></div>

<button onclick="addLink()">+ link</button>
<button onclick="saveProfile()">save</button>

<p id="out"></p>
`;

let file=null;

uploadBox.onclick=()=>{
  const i=document.createElement("input");
  i.type="file";i.accept="image/*";
  i.onchange=e=>handle(e.target.files[0]);
  i.click();
};

function handle(f){
  file=f;
  const r=new FileReader();
  r.onload=e=>{
    preview.src=e.target.result;
    preview.style.display="block";
  };
  r.readAsDataURL(f);
}

window.addLink=()=>{
  const d=document.createElement("div");
  d.innerHTML=`<input placeholder="title"><input placeholder="url">`;
  links.appendChild(d);
};

window.saveProfile=async()=>{
  const u=usernameInput.value.trim();
  if(!u)return alert("username");

  let img="";
  if(file) img=await resizeToBase64(file);

  await setDoc(doc(db,"users",u),{
    bio:bio.value,
    pfp:img,
    theme:theme.value,
    links:[...links.children].map(r=>{
      const t=r.children[0].value;
      const u=r.children[1].value;
      if(!t||!u)return null;
      return {title:t,url:u};
    }).filter(x=>x)
  });

  out.innerText=location.origin+location.pathname+"#/"+u;
};

}

stars();
</script>

</body>
</html>
