<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>biolnk</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Space Grotesk',sans-serif;
  background:#000;
  color:#fff;
}

/* canvas */
canvas{
  position:fixed;
  top:0;left:0;
  z-index:-1;
}

/* card */
.center{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  width:90%;max-width:420px;
  padding:20px;
  border-radius:16px;
  background:rgba(0,0,0,0.6);
  border:1px solid rgba(255,255,255,0.1);
  animation:fadeIn .4s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translate(-50%,-55%)}
  to{opacity:1;transform:translate(-50%,-50%)}
}

h1{
  font-size:40px;
  margin-bottom:10px;
}

p{color:#aaa}

input,select{
  width:100%;
  padding:10px;
  margin:6px 0;
  background:#111;
  border:1px solid #333;
  color:#fff;
  border-radius:8px;
}

button{
  margin-top:10px;
  padding:10px 20px;
  border-radius:16px;
  border:1px solid #fff;
  background:transparent;
  color:#fff;
  cursor:pointer;
}
button:hover{
  background:#fff;
  color:#000;
}

/* links */
.links a{
  display:block;
  margin:8px auto;
  padding:10px;
  border-radius:16px;
  text-decoration:none;
  color:#fff;
  width:220px;
  border:1px solid rgba(255,255,255,0.2);
}
.links a:hover{
  background:#fff;
  color:#000;
}

.links i{margin-right:8px}

img{
  border-radius:50%;
  margin-bottom:10px;
}

.upload{
  border:2px dashed #555;
  padding:16px;
  border-radius:10px;
  margin:10px 0;
  cursor:pointer;
}
.upload:hover{border-color:#fff}

/* themes */
.theme-purple{color:#c084fc}
.theme-blue{color:#38bdf8}
.theme-red{color:#f87171}
.theme-green{color:#4ade80}
.theme-gold{color:#facc15}
</style>
</head>

<body>

<canvas id="bg"></canvas>
<div class="center" id="app">loading...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const db = getFirestore(initializeApp({
  apiKey:"AIzaSyCsWG4bQeRA8SvR6BQKu-l4DGsfk22iqHg",
  authDomain:"bluesharklethal.firebaseapp.com",
  projectId:"bluesharklethal"
}));

const app = document.getElementById("app");

/* =========================
   AUTH (DISCORD FROM YOUR WORKER)
========================= */
let user = JSON.parse(localStorage.getItem("discordUser") || "null");

window.loginDiscord = () => {
  const popup = window.open(
    "https://biolnk.snutdddee.workers.dev/login",
    "discord",
    "width=500,height=700"
  );

  window.addEventListener("message", (e) => {
    if (!e.data?.id) return;

    user = e.data;
    localStorage.setItem("discordUser", JSON.stringify(user));

    loadEditor();
  });
};

window.logout = () => {
  localStorage.removeItem("discordUser");
  user = null;
  location.hash = "";
  showLogin();
};

/* =========================
   ROUTING
========================= */
const route = location.hash.replace("#/","").toLowerCase();

/* =========================
   ICONS
========================= */
function icon(url){
  if(url.includes("github")) return "fa-brands fa-github";
  if(url.includes("discord")) return "fa-brands fa-discord";
  if(url.includes("youtube")) return "fa-brands fa-youtube";
  return "fa-solid fa-link";
}

/* =========================
   STAR BACKGROUND
========================= */
function stars(){
  const c = bg;
  const ctx = c.getContext("2d");

  function resize(){
    c.width = innerWidth;
    c.height = innerHeight;
  }

  resize();
  addEventListener("resize", resize);

  let s = Array.from({length:70},()=>({
    x:Math.random()*c.width,
    y:Math.random()*c.height,
    v:Math.random()*0.4
  }));

  function loop(){
    ctx.fillStyle="#000";
    ctx.fillRect(0,0,c.width,c.height);

    s.forEach(star=>{
      star.y += star.v;
      if(star.y > c.height){
        star.y = 0;
        star.x = Math.random()*c.width;
      }
      ctx.fillStyle="#fff";
      ctx.fillRect(star.x,star.y,1.5,1.5);
    });

    requestAnimationFrame(loop);
  }

  loop();
}
stars();

/* =========================
   PROFILE VIEW
========================= */
async function loadProfile(name){
  const snap = await getDoc(doc(db,"users",name));

  if(!snap.exists()){
    app.innerHTML = "<h1>user not found</h1>";
    return;
  }

  const d = snap.data();

  app.innerHTML = `
    ${d.pfp ? `<img src="${d.pfp}" width="100">` : ""}
    <h1 class="${d.theme||""}">${d.username}</h1>
    <p>${d.bio||""}</p>

    <div class="links">
      ${(d.links||[]).map(l=>`
        <a href="${l.url}" target="_blank">
          <i class="${icon(l.url)}"></i> ${l.title}
        </a>
      `).join("")}
    </div>
  `;
}

/* =========================
   LOGIN SCREEN
========================= */
function showLogin(){
  app.innerHTML = `
    <h2>biolnk</h2>
    <button onclick="loginDiscord()">Login with Discord</button>
  `;
}

/* =========================
   EDITOR
========================= */
function loadEditor(){

  app.innerHTML = `
    <h2>editor</h2>
    <p>logged in as <b>${user.username}</b></p>

    <button onclick="logout()">logout</button>

    <input id="username" placeholder="username">
    <input id="bio" placeholder="bio">

    <select id="theme">
      <option value="">default</option>
      <option value="theme-purple">purple</option>
      <option value="theme-blue">blue</option>
      <option value="theme-red">red</option>
      <option value="theme-green">green</option>
      <option value="theme-gold">gold</option>
    </select>

    <div class="upload" id="upload">upload image</div>
    <img id="preview" width="80" style="display:none">

    <div id="links"></div>

    <button id="add">+ link</button>
    <button id="save">save</button>

    <p id="out"></p>
  `;

  const username = document.getElementById("username");
  const bio = document.getElementById("bio");
  const theme = document.getElementById("theme");
  const links = document.getElementById("links");
  const upload = document.getElementById("upload");
  const preview = document.getElementById("preview");
  const out = document.getElementById("out");

  let file = null;

  const uname = user.username.toLowerCase();

  getDoc(doc(db,"users",uname)).then(snap=>{
    if(snap.exists()){
      const d = snap.data();
      username.value = d.username || "";
      bio.value = d.bio || "";
      theme.value = d.theme || "";
    }
  });

  upload.onclick = () => {
    const i = document.createElement("input");
    i.type = "file";
    i.accept = "image/*";

    i.onchange = e => {
      file = e.target.files[0];
      const fr = new FileReader();
      fr.onload = ev => {
        preview.src = ev.target.result;
        preview.style.display = "block";
      };
      fr.readAsDataURL(file);
    };

    i.click();
  };

  document.getElementById("add").onclick = () => {
    const r = document.createElement("div");
    r.innerHTML = `
      <input placeholder="title">
      <input placeholder="url">
    `;
    links.appendChild(r);
  };

  document.getElementById("save").onclick = async () => {
    try{

      let img = "";

      if(file){
        img = await new Promise(r=>{
          const fr = new FileReader();
          fr.onload = e => r(e.target.result);
          fr.readAsDataURL(file);
        });
      }

      const uname = username.value.trim().toLowerCase();

      await setDoc(doc(db,"users",uname),{
        username: uname,
        bio: bio.value,
        theme: theme.value,
        pfp: img || "",
        ownerId: user.id,
        links: [...links.children].map(r=>({
          title:r.children[0].value,
          url:r.children[1].value
        }))
      });

      out.innerText = "saved ✔";
      location.hash = "#/" + uname;

    } catch(e){
      console.error(e);
      out.innerText = "save failed ❌";
    }
  };
}

/* =========================
   START
========================= */
(async function start(){

  if(route){
    await loadProfile(route);
  } else {
    if(user) loadEditor();
    else showLogin();
  }

})();
</script>

</body>
</html>
