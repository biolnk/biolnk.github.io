<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>biolnk</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Space Grotesk',sans-serif;
  background:#000;
  color:#fff;
  overflow:hidden;
}

/* glow cursor */
.cursor{
  position:fixed;
  width:200px;height:200px;
  background:radial-gradient(circle,rgba(255,255,255,0.15),transparent);
  pointer-events:none;
  transform:translate(-50%,-50%);
  z-index:0;
}

canvas{position:fixed;top:0;left:0;z-index:-1}

.center{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  width:90%;max-width:420px;
  backdrop-filter:blur(12px);
  padding:20px;
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.1);
}

/* text glow */
h1{
  font-size:48px;
  text-shadow:0 0 15px currentColor;
}

/* inputs */
input,select{
  width:100%;
  padding:10px;
  margin:6px 0;
  background:#111;
  border:1px solid #333;
  color:#fff;
  border-radius:8px;
}

/* buttons */
button{
  margin-top:10px;
  padding:10px 20px;
  border-radius:20px;
  border:1px solid #fff;
  background:transparent;
  color:#fff;
  cursor:pointer;
  transition:.2s;
}
button:hover{
  background:#fff;
  color:#000;
  transform:scale(1.05);
}

/* links */
.links a{
  display:block;
  margin:8px auto;
  padding:12px;
  border-radius:20px;
  text-decoration:none;
  color:#fff;
  width:240px;
  border:1px solid rgba(255,255,255,0.2);
  transition:.2s;
}
.links a:hover{
  background:#fff;
  color:#000;
  transform:scale(1.05);
}

.links i{margin-right:8px}
img{border-radius:50%;margin-bottom:10px}

/* themes */
.theme-purple{color:#c084fc}
.theme-blue{color:#38bdf8}
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<canvas id="bg"></canvas>
<div class="center" id="app"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCsWG4bQeRA8SvR6BQKu-l4DGsfk22iqHg",
  authDomain: "bluesharklethal.firebaseapp.com",
  projectId: "bluesharklethal",
};

const db = getFirestore(initializeApp(firebaseConfig));
const app = document.getElementById("app");

// cursor glow
const cursor = document.getElementById("cursor");
document.addEventListener("mousemove", e=>{
  cursor.style.left=e.clientX+"px";
  cursor.style.top=e.clientY+"px";
});

// icons
function icon(url){
  if(url.includes("github")) return "fa-brands fa-github";
  if(url.includes("discord")) return "fa-brands fa-discord";
  if(url.includes("youtube")) return "fa-brands fa-youtube";
  return "fa-solid fa-link";
}

// particles
function particles(){
  const c=document.getElementById('bg');
  const ctx=c.getContext('2d');
  function resize(){c.width=innerWidth;c.height=innerHeight}
  resize();addEventListener('resize',resize);

  let p=Array.from({length:60},()=>({
    x:Math.random()*c.width,
    y:Math.random()*c.height,
    vx:(Math.random()-.5)*0.3,
    vy:(Math.random()-.5)*0.3
  }));

  function loop(){
    ctx.clearRect(0,0,c.width,c.height);
    p.forEach(pt=>{
      pt.x+=pt.vx; pt.y+=pt.vy;
      if(pt.x<0||pt.x>c.width)pt.vx*=-1;
      if(pt.y<0||pt.y>c.height)pt.vy*=-1;
      ctx.fillRect(pt.x,pt.y,1.5,1.5);
    });
    requestAnimationFrame(loop);
  }
  loop();
}

// routing
const username = location.hash.replace("#/","");

// VIEW PROFILE
if(username){
  const snap = await getDoc(doc(db,"users",username));

  if(!snap.exists()){
    app.innerHTML="<h1>not found</h1>";
  } else {
    const d=snap.data();
    document.body.className=d.theme||"";

    app.innerHTML=`
      ${d.pfp?`<img src="${d.pfp}" width="100">`:""}
      <h1>${username}</h1>
      <p>${d.bio||""}</p>
      <div class="links">
        ${d.links.map(l=>`
          <a href="${l.url}" target="_blank">
            <i class="${icon(l.url)}"></i> ${l.title}
          </a>`).join("")}
      </div>
    `;
  }

  particles();

} else {

// EDITOR
app.innerHTML=`
<h1>create</h1>

<input id="usernameInput" placeholder="username">
<input id="bio" placeholder="bio">
<input id="pfp" placeholder="profile image URL">

<select id="theme">
  <option value="">default</option>
  <option value="theme-purple">purple</option>
  <option value="theme-blue">blue</option>
</select>

<div id="links"></div>

<button onclick="addLink()">+ link</button>
<button onclick="saveProfile()">save</button>
<button onclick="copyLink()">copy link</button>

<p id="out"></p>
`;

// preload existing profile
window.addEventListener("load", async ()=>{
  const last = localStorage.getItem("lastUser");
  if(!last) return;

  const snap = await getDoc(doc(db,"users",last));
  if(!snap.exists()) return;

  const d = snap.data();

  usernameInput.value = last;
  bio.value = d.bio || "";
  pfp.value = d.pfp || "";
  theme.value = d.theme || "";

  d.links.forEach(l=>{
    addLink(l.title,l.url);
  });
});

// add link
window.addLink = (t="",u="")=>{
  const d=document.createElement("div");
  d.className="linkRow";
  d.innerHTML=`<input value="${t}" placeholder="title"><input value="${u}" placeholder="url">`;
  document.getElementById("links").appendChild(d);
};

// save
window.saveProfile = async ()=>{
  const username=usernameInput.value.trim();
  if(!username)return alert("username");

  const ref=doc(db,"users",username);
  const existing=await getDoc(ref);
  const owner=localStorage.getItem("owner_"+username);

  if(existing.exists()&&!owner){
    alert("taken");
    return;
  }

  const data={
    bio:bio.value,
    pfp:pfp.value,
    theme:theme.value,
    links:[...document.querySelectorAll("#links div")]
      .map(r=>{
        const t=r.children[0].value;
        const u=r.children[1].value;
        if(!t||!u)return null;
        return {title:t,url:u};
      }).filter(x=>x)
  };

  await setDoc(ref,data);

  localStorage.setItem("owner_"+username,"true");
  localStorage.setItem("lastUser",username);

  out.innerText=location.origin+location.pathname+"#/"+username;
};

// copy link
window.copyLink=()=>{
  navigator.clipboard.writeText(out.innerText);
};

particles();
}
</script>

</body>
</html>
