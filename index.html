<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>biolnk</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Space Grotesk',sans-serif;
  background:#000;
  color:#fff;
  overflow:hidden;
}

.center{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  width:90%;
  max-width:420px;
  padding:25px;
  border-radius:24px;
  background:rgba(20,20,40,0.4);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.1);
}

button{
  margin-top:10px;
  padding:10px 18px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.2);
  background:#111;
  color:#fff;
  cursor:pointer;
}

button:hover{
  background:#222;
}
</style>
</head>

<body>

<div class="center" id="app">
  <h2>biolnk</h2>
  <button onclick="loginDiscord()">Login with Discord</button>
</div>

<script>
let currentUser = null;

// ======================
// DISCORD LOGIN
// ======================
window.loginDiscord = () => {
  const popup = window.open(
    "https://biolnk.snutdddee.workers.dev/login",
    "discord",
    "width=500,height=700"
  );

  window.addEventListener("message", (event) => {
    if (!event.data || !event.data.id) return;

    currentUser = event.data;

    document.getElementById("app").innerHTML = `
      <h1>Welcome</h1>
      <p><b>${currentUser.username}</b></p>
      <p>ID: ${currentUser.id}</p>
      <button onclick="logout()">Logout</button>
    `;
  });
};

// ======================
// LOGOUT
// ======================
window.logout = () => {
  currentUser = null;
  location.reload();
};
</script>

</body>
</html>
