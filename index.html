<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>biolnk</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Space Grotesk',sans-serif;
  background:#000;
  color:#fff;
}
canvas{position:fixed;top:0;left:0;z-index:-1}

.center{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  width:90%;max-width:420px;
  padding:20px;
  border-radius:20px;
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.1);
}

h1{font-size:42px;text-shadow:0 0 10px currentColor}

input,select{
  width:100%;
  padding:10px;
  margin:6px 0;
  background:#111;
  border:1px solid #333;
  color:#fff;
  border-radius:8px;
}

button{
  margin-top:10px;
  padding:10px 20px;
  border-radius:20px;
  border:1px solid #fff;
  background:transparent;
  color:#fff;
  cursor:pointer;
}
button:hover{background:#fff;color:#000}

.links a{
  display:block;
  margin:8px auto;
  padding:10px;
  border-radius:20px;
  text-decoration:none;
  color:#fff;
  width:220px;
  border:1px solid rgba(255,255,255,0.2);
}
.links a:hover{background:#fff;color:#000}

.links i{margin-right:8px}
img{border-radius:50%;margin-bottom:10px}

.upload{
  border:2px dashed #555;
  padding:20px;
  border-radius:12px;
  margin:10px 0;
  cursor:pointer;
}
.upload:hover{border-color:#fff}

.theme-purple{color:#c084fc}
.theme-blue{color:#38bdf8}
</style>
</head>
<body>

<canvas id="bg"></canvas>
<div class="center" id="app"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCsWG4bQeRA8SvR6BQKu-l4DGsfk22iqHg",
  authDomain: "bluesharklethal.firebaseapp.com",
  projectId: "bluesharklethal",
};

const db = getFirestore(initializeApp(firebaseConfig));
const app = document.getElementById("app");

// ---------- ICONS ----------
function icon(url){
  if(url.includes("github")) return "fa-brands fa-github";
  if(url.includes("discord")) return "fa-brands fa-discord";
  if(url.includes("youtube")) return "fa-brands fa-youtube";
  return "fa-solid fa-link";
}

// ---------- PARTICLES ----------
function particles(){
  const c=document.getElementById('bg');
  const ctx=c.getContext('2d');
  function resize(){c.width=innerWidth;c.height=innerHeight}
  resize();window.addEventListener('resize',resize);

  let p=Array.from({length:60},()=>({
    x:Math.random()*c.width,
    y:Math.random()*c.height,
    vx:(Math.random()-.5)*0.3,
    vy:(Math.random()-.5)*0.3
  }));

  function loop(){
    ctx.clearRect(0,0,c.width,c.height);
    p.forEach(pt=>{
      pt.x+=pt.vx; pt.y+=pt.vy;
      if(pt.x<0||pt.x>c.width)pt.vx*=-1;
      if(pt.y<0||pt.y>c.height)pt.vy*=-1;
      ctx.fillRect(pt.x,pt.y,1.5,1.5);
    });
    requestAnimationFrame(loop);
  }
  loop();
}

// ---------- IMAGE RESIZE TO BASE64 ----------
function resizeToBase64(file){
  return new Promise(resolve=>{
    const img = new Image();
    const reader = new FileReader();

    reader.onload = e => img.src = e.target.result;

    img.onload = () => {
      const canvas = document.createElement("canvas");
      const max = 200;

      let w = img.width;
      let h = img.height;

      if(w > h && w > max){ h *= max/w; w = max; }
      if(h > w && h > max){ w *= max/h; h = max; }

      canvas.width = w;
      canvas.height = h;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(img,0,0,w,h);

      resolve(canvas.toDataURL("image/jpeg", 0.6));
    };

    reader.readAsDataURL(file);
  });
}

// ---------- ROUTING ----------
const username = location.hash.replace("#/","");

// ---------- VIEW PROFILE ----------
if(username){
  const snap = await getDoc(doc(db,"users",username));

  if(!snap.exists()){
    app.innerHTML="<h1>user not found</h1>";
  } else {
    const d = snap.data();
    document.body.className = d.theme || "";

    app.innerHTML=`
      ${d.pfp?`<img src="${d.pfp}" width="100">`:""}
      <h1>${username}</h1>
      <p>${d.bio||""}</p>
      <div class="links">
        ${d.links.map(l=>`
          <a href="${l.url}" target="_blank">
            <i class="${icon(l.url)}"></i> ${l.title}
          </a>`).join("")}
      </div>
    `;
  }

  particles();

} else {

// ---------- EDITOR ----------
app.innerHTML=`
<h1>create</h1>

<input id="usernameInput" placeholder="username">
<input id="bio" placeholder="bio">

<div class="upload" id="uploadBox">
  drag & drop image or click
</div>

<img id="preview" width="80" style="display:none">

<select id="theme">
  <option value="">default</option>
  <option value="theme-purple">purple</option>
  <option value="theme-blue">blue</option>
</select>

<div id="links"></div>

<button onclick="addLink()">+ link</button>
<button onclick="saveProfile()">save</button>

<p id="out"></p>
`;

let uploadedFile = null;

// upload handlers
const box = document.getElementById("uploadBox");

box.onclick = () => {
  const input = document.createElement("input");
  input.type="file";
  input.accept="image/*";
  input.onchange = e => handleFile(e.target.files[0]);
  input.click();
};

box.ondragover = e => e.preventDefault();
box.ondrop = e => {
  e.preventDefault();
  handleFile(e.dataTransfer.files[0]);
};

function handleFile(file){
  uploadedFile = file;

  const reader = new FileReader();
  reader.onload = e=>{
    preview.src = e.target.result;
    preview.style.display="block";
  };
  reader.readAsDataURL(file);
}

// add link
window.addLink = ()=>{
  const d=document.createElement("div");
  d.innerHTML=`<input placeholder="title"><input placeholder="url">`;
  links.appendChild(d);
};

// save
window.saveProfile = async ()=>{
  const username=usernameInput.value.trim();
  if(!username) return alert("enter username");

  let imageData = "";
  if(uploadedFile){
    imageData = await resizeToBase64(uploadedFile);
  }

  const data={
    bio:bio.value,
    pfp:imageData,
    theme:theme.value,
    links:[...links.children].map(r=>{
      const t=r.children[0].value;
      const u=r.children[1].value;
      if(!t||!u) return null;
      return {title:t,url:u};
    }).filter(x=>x)
  };

  await setDoc(doc(db,"users",username), data);

  out.innerText = location.origin + location.pathname + "#/" + username;
};

particles();
}
</script>

</body>
</html>
