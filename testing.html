<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>biolnk</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#0a0a12;
  --surface:#11111a;
  --border:#1f1f2a;
  --text:#e5e7eb;
  --muted:#9ca3af;
  --accent:#5865F2;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:'Inter',system-ui;
  background:var(--bg);
  color:var(--text);
}

canvas{
  position:fixed;
  inset:0;
  z-index:0;
}

#root{
  position:relative;
  z-index:1;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.card{
  width:100%;
  max-width:420px;
  background:rgba(17,17,26,0.9);
  border:1px solid var(--border);
  border-radius:18px;
  padding:28px;
  backdrop-filter:blur(20px);
}

.wordmark{
  font-size:22px;
  font-weight:700;
  letter-spacing:-0.02em;
  margin-bottom:6px;
}

.tagline{
  font-size:13px;
  color:var(--muted);
  margin-bottom:20px;
}

.btn{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  background:var(--accent);
  color:#fff;
  font-weight:600;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.btn:hover{opacity:0.9;}

input{
  width:100%;
  padding:10px;
  margin-top:8px;
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--text);
  border-radius:8px;
}

.links a{
  display:block;
  padding:10px;
  margin-top:6px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:8px;
  text-decoration:none;
  color:var(--text);
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div id="root">
  <div class="card" id="app"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const db=getFirestore(initializeApp({
  apiKey:"AIzaSy...",
  authDomain:"bluesharklethal.firebaseapp.com",
  projectId:"bluesharklethal"
}));

const app=document.getElementById("app");

let user=JSON.parse(localStorage.getItem("discordUser")||"null");

window.loginDiscord=()=>{
  const w=window.open("https://biolnk.snutdddee.workers.dev/login","d","width=500,height=700");
  window.addEventListener("message",(e)=>{
    if(!e.data?.id)return;
    user=e.data;
    localStorage.setItem("discordUser",JSON.stringify(user));
    start();
  });
};

function showLogin(){
  app.innerHTML=`
    <div class="wordmark">biolnk</div>
    <div class="tagline">simple link page</div>
    <button class="btn" onclick="loginDiscord()">Continue with Discord</button>
  `;
}

async function loadProfile(name){
  const res=await getDocs(query(collection(db,"users"),where("username","==",name)));
  if(res.empty){app.innerHTML="not found";return;}
  const d=res.docs[0].data();

  app.innerHTML=`
    <div class="wordmark">${d.username}</div>
    <div class="tagline">${d.bio||""}</div>
    <div class="links">
      ${(d.links||[]).map(l=>`<a href="${l.url}" target="_blank">${l.title||l.url}</a>`).join("")}
    </div>
  `;
}

function start(){
  const route=location.hash.replace("#/","");
  if(route) loadProfile(route);
  else showLogin();
}
start();

/* STARFIELD */
function stars(){
  const c=document.getElementById("bg");
  const ctx=c.getContext("2d");
  function resize(){c.width=innerWidth;c.height=innerHeight;}
  resize(); addEventListener("resize",resize);

  const stars=[...Array(120)].map(()=>({
    x:Math.random()*c.width,
    y:Math.random()*c.height,
    r:Math.random()*1.5,
    v:Math.random()*0.3,
    o:Math.random(),
    t:Math.random()*0.02
  }));

  const shooting=[];

  setInterval(()=>{
    shooting.push({x:Math.random()*c.width,y:-20,len:100,life:0});
  },3000);

  function loop(){
    ctx.clearRect(0,0,c.width,c.height);

    stars.forEach(s=>{
      s.y+=s.v;
      s.o+=s.t;
      if(s.o<0.2||s.o>1)s.t*=-1;
      if(s.y>c.height){s.y=0;s.x=Math.random()*c.width;}

      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${s.o})`;
      ctx.fill();
    });

    shooting.forEach((s,i)=>{
      s.x+=6; s.y+=6; s.life++;
      ctx.beginPath();
      ctx.moveTo(s.x,s.y);
      ctx.lineTo(s.x-s.len,s.y-s.len);
      ctx.strokeStyle="white";
      ctx.stroke();
      if(s.life>50)shooting.splice(i,1);
    });

    requestAnimationFrame(loop);
  }
  loop();
}
stars();
</script>

</body>
</html>
