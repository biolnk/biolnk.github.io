<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #080810;
  --surface: rgba(255,255,255,0.04);
  --surface-hover: rgba(255,255,255,0.07);
  --border: rgba(255,255,255,0.08);
  --text: #f0f0f5;
  --muted: rgba(240,240,245,0.45);
  --accent: #5865F2;
  --radius: 14px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Space Grotesk', sans-serif;
  background: radial-gradient(circle at 20% 20%, #0c0c18, #050508 60%);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* canvas */
canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* layout */
#root {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px 16px 80px;
}

/* card */
.card {
  width: 100%;
  max-width: 420px;
  background: rgba(12, 12, 22, 0.75);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 20px;
  padding: 36px 32px;
  backdrop-filter: blur(30px);
  box-shadow:
    0 0 60px rgba(88,101,242,0.08),
    0 30px 80px rgba(0,0,0,0.6);
}

/* glow text */
.wordmark, .profile-name {
  font-weight: 700;
  text-shadow:
    0 0 10px rgba(255,255,255,0.15),
    0 0 25px rgba(88,101,242,0.15);
}

.wordmark { font-size: 26px; }

/* inputs/buttons unchanged except subtle polish */
input, textarea, select {
  width: 100%;
  padding: 11px 14px;
  margin: 4px 0;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
}

.btn {
  padding: 11px 20px;
  border-radius: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  cursor: pointer;
}

.btn-primary {
  background: var(--accent);
  color: #fff;
  box-shadow:
    0 0 20px rgba(88,101,242,0.4),
    0 0 40px rgba(88,101,242,0.2);
}
</style>

</head>

<body>

<canvas id="bg"></canvas>

<div id="root">
  <div class="card" id="app">
    <div style="display:flex;align-items:center;justify-content:center;padding:20px">
      loading...
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, doc, setDoc, getDoc,
  collection, query, where, getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* FIREBASE (UNCHANGED) */
const db = getFirestore(initializeApp({
  apiKey: "AIzaSy...",
  authDomain: "bluesharklethal.firebaseapp.com",
  projectId: "bluesharklethal"
}));

/* ===== STARFIELD + SHOOTING STARS (SAFE ADDITION) ===== */
const c = document.getElementById("bg");
const ctx = c.getContext("2d");

function resize() {
  c.width = innerWidth;
  c.height = innerHeight;
}
resize();
addEventListener("resize", resize);

const stars = Array.from({length:90}, () => ({
  x: Math.random()*innerWidth,
  y: Math.random()*innerHeight,
  r: Math.random()*1.2+0.2,
  v: Math.random()*0.3+0.05,
  o: Math.random()*0.6+0.2
}));

const shootingStars = [];

function spawnShootingStar() {
  shootingStars.push({
    x: Math.random()*c.width,
    y: Math.random()*c.height*0.5,
    len: Math.random()*120+80,
    speed: Math.random()*6+6,
    life: 0
  });
}

setInterval(() => {
  if (Math.random() < 0.4) spawnShootingStar();
}, 2000);

function loop() {
  ctx.clearRect(0,0,c.width,c.height);

  stars.forEach(star => {
    star.y += star.v;
    if (star.y > c.height) {
      star.y = 0;
      star.x = Math.random()*c.width;
    }
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(200,205,255,${star.o})`;
    ctx.fill();
  });

  shootingStars.forEach((s,i)=>{
    s.x+=s.speed;
    s.y+=s.speed*0.3;
    s.life++;

    const g = ctx.createLinearGradient(
      s.x, s.y,
      s.x - s.len, s.y - s.len*0.3
    );

    g.addColorStop(0,"rgba(255,255,255,0.9)");
    g.addColorStop(1,"rgba(255,255,255,0)");

    ctx.strokeStyle = g;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(s.x,s.y);
    ctx.lineTo(s.x - s.len, s.y - s.len*0.3);
    ctx.stroke();

    if (s.life > 20) shootingStars.splice(i,1);
  });

  requestAnimationFrame(loop);
}
loop();

</script>
