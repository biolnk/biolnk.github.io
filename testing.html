<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>biolnk</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
  --bg: #05050a;
  --surface: rgba(255,255,255,0.05);
  --surface-hover: rgba(255,255,255,0.08);
  --border: rgba(255,255,255,0.08);
  --border-hover: rgba(255,255,255,0.2);
  --text: #ffffff;
  --muted: rgba(255,255,255,0.55);
  --accent: #7c5cff;
  --accent-glow: rgba(124,92,255,0.35);
  --radius: 16px;
  --radius-sm: 10px;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Space Grotesk', sans-serif;
}

/* GLOBAL GLOW TEXT */
body {
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  text-shadow: 0 0 10px rgba(255,255,255,0.15);
}

/* BACKGROUND CANVAS */
canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ROOT */
#root {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 16px;
}

/* CARD */
.card {
  width: 100%;
  max-width: 440px;
  background: rgba(10,10,18,0.75);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 34px;
  backdrop-filter: blur(26px);
  box-shadow: 0 0 40px rgba(0,0,0,0.6);
  animation: pop 0.5s ease;
}

@keyframes pop {
  from { transform: translateY(20px) scale(0.98); opacity: 0; }
  to { transform: translateY(0) scale(1); opacity: 1; }
}

/* TEXT GLOW */
.wordmark,
.profile-name,
.section-label {
  color: #fff;
  text-shadow:
    0 0 8px rgba(255,255,255,0.4),
    0 0 20px rgba(124,92,255,0.25);
}

.wordmark {
  font-size: 28px;
  font-weight: 700;
  text-align: center;
}

.wordmark span {
  color: var(--accent);
  text-shadow: 0 0 20px var(--accent-glow);
}

.tagline {
  text-align: center;
  font-size: 13px;
  color: var(--muted);
  margin-top: 6px;
}

/* INPUTS */
input, select, textarea {
  width: 100%;
  padding: 12px 14px;
  margin: 6px 0;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface);
  color: #fff;
  outline: none;
  transition: 0.2s;
}

input:focus {
  border-color: var(--border-hover);
  box-shadow: 0 0 0 3px rgba(124,92,255,0.2);
}

/* BUTTONS */
.btn {
  width: 100%;
  padding: 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface);
  color: #fff;
  cursor: pointer;
  transition: 0.2s;
  font-weight: 500;
}

.btn:hover {
  transform: translateY(-2px);
  background: var(--surface-hover);
}

.btn-primary {
  background: var(--accent);
  border: none;
  box-shadow: 0 0 25px var(--accent-glow);
}

/* LINKS */
.profile-links a {
  display: flex;
  gap: 10px;
  padding: 12px;
  margin: 6px 0;
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: #fff;
  text-decoration: none;
  transition: 0.2s;
}

.profile-links a:hover {
  transform: translateX(4px);
  background: var(--surface-hover);
}

/* DIVIDER */
.divider {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 18px 0;
  color: var(--muted);
}

.divider::before,
.divider::after {
  content: "";
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* FOOTER */
footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  text-align: center;
  padding: 14px;
  color: var(--muted);
}

/* SPINNER */
.spinner {
  width: 18px;
  height: 18px;
  border: 2px solid rgba(255,255,255,0.15);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div id="root">
  <div class="card" id="app">
    <div style="text-align:center">
      <div class="spinner"></div>
    </div>
  </div>
</div>

<footer>biolnk — glowing link-in-bio system</footer>

<script>
/* ───────── BACKGROUND: STARS + SHOOTING STARS ───────── */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* Stars */
const stars = Array.from({length: 120}, () => ({
  x: Math.random() * innerWidth,
  y: Math.random() * innerHeight,
  r: Math.random() * 1.2,
  v: Math.random() * 0.3 + 0.05
}));

/* Shooting stars */
const shoots = [];

function spawnShoot() {
  shoots.push({
    x: Math.random() * innerWidth,
    y: Math.random() * innerHeight * 0.3,
    vx: 6 + Math.random() * 4,
    vy: 3 + Math.random() * 2,
    life: 60
  });
}

setInterval(spawnShoot, 2000);

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  /* stars */
  for (let s of stars) {
    s.y += s.v;
    if (s.y > innerHeight) s.y = 0;

    ctx.fillStyle = "rgba(255,255,255,0.8)";
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fill();
  }

  /* shooting stars */
  for (let i = shoots.length - 1; i >= 0; i--) {
    const s = shoots[i];
    s.x += s.vx;
    s.y += s.vy;
    s.life--;

    ctx.strokeStyle = "rgba(255,255,255,0.8)";
    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(s.x - 20, s.y - 10);
    ctx.stroke();

    if (s.life <= 0) shoots.splice(i,1);
  }

  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
