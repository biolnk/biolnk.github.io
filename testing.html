/* ── STARS (UPDATED SAFELY) ── */
function stars() {
  const c = document.getElementById("bg");
  const ctx = c.getContext("2d");

  function resize() {
    c.width = innerWidth;
    c.height = innerHeight;
  }
  resize();
  addEventListener("resize", resize);

  const s = Array.from({length:90}, () => ({
    x: Math.random()*innerWidth,
    y: Math.random()*innerHeight,
    r: Math.random()*1.2+0.2,
    v: Math.random()*0.3+0.05,
    o: Math.random()*0.6+0.2
  }));

  const shootingStars = [];

  function spawnShootingStar() {
    shootingStars.push({
      x: Math.random()*c.width,
      y: Math.random()*c.height*0.5,
      len: Math.random()*120+80,
      speed: Math.random()*6+6,
      life: 0
    });
  }

  setInterval(() => {
    if (Math.random() < 0.4) spawnShootingStar();
  }, 2000);

  function loop() {
    ctx.clearRect(0,0,c.width,c.height);

    s.forEach(star => {
      star.y += star.v;
      if (star.y > c.height) {
        star.y = 0;
        star.x = Math.random()*c.width;
      }
      ctx.beginPath();
      ctx.arc(star.x, star.y, star.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(200,205,255,${star.o})`;
      ctx.fill();
    });

    shootingStars.forEach((st,i)=>{
      st.x += st.speed;
      st.y += st.speed * 0.3;
      st.life++;

      const g = ctx.createLinearGradient(
        st.x, st.y,
        st.x - st.len, st.y - st.len * 0.3
      );

      g.addColorStop(0,"rgba(255,255,255,0.9)");
      g.addColorStop(1,"rgba(255,255,255,0)");

      ctx.strokeStyle = g;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(st.x, st.y);
      ctx.lineTo(st.x - st.len, st.y - st.len * 0.3);
      ctx.stroke();

      if (st.life > 20) shootingStars.splice(i,1);
    });

    requestAnimationFrame(loop);
  }

  loop();
}
stars();
