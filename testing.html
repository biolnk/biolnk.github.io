<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>biolnk</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
  --bg: #050508;
  --surface: rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.08);
  --text: #f5f7ff;
  --muted: rgba(255,255,255,0.55);
  --accent: #5865F2;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Space Grotesk', sans-serif;
  background: radial-gradient(circle at 20% 20%, #0c0c18, #050508 60%);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

#root {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px;
}

.card {
  width: 100%;
  max-width: 420px;
  background: rgba(10,10,18,0.6);
  border-radius: 20px;
  padding: 32px;
  backdrop-filter: blur(30px);
  border: 1px solid rgba(255,255,255,0.06);
  box-shadow: 0 0 60px rgba(88,101,242,0.08), 0 20px 60px rgba(0,0,0,0.6);
}

.wordmark {
  font-weight: 700;
  font-size: 26px;
  text-shadow: 0 0 12px rgba(255,255,255,0.15);
  margin-bottom: 10px;
}

.btn {
  padding: 10px 16px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

.btn-primary {
  background: var(--accent);
  color: white;
  box-shadow: 0 0 20px rgba(88,101,242,0.4);
}
</style>

</head>

<body>

<canvas id="bg"></canvas>

<div id="root">
  <div class="card" id="app">
    <div class="wordmark">biolnk</div>
    <p style="color:var(--muted)">app loaded ✓</p>
  </div>
</div>

<script>
/* ===== STARFIELD + SHOOTING STARS ===== */
const c = document.getElementById("bg");
const ctx = c.getContext("2d");

function resize() {
  c.width = innerWidth;
  c.height = innerHeight;
}
resize();
window.addEventListener("resize", resize);

const stars = Array.from({length: 90}, () => ({
  x: Math.random() * innerWidth,
  y: Math.random() * innerHeight,
  r: Math.random() * 1.2,
  v: Math.random() * 0.3 + 0.05
}));

const shootingStars = [];

function spawnShootingStar() {
  shootingStars.push({
    x: Math.random() * c.width,
    y: Math.random() * c.height * 0.5,
    len: Math.random() * 120 + 80,
    speed: Math.random() * 6 + 6,
    life: 0
  });
}

setInterval(() => {
  if (Math.random() < 0.5) spawnShootingStar();
}, 2000);

function loop() {
  ctx.clearRect(0, 0, c.width, c.height);

  stars.forEach(s => {
    s.y += s.v;
    if (s.y > c.height) {
      s.y = 0;
      s.x = Math.random() * c.width;
    }

    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = "white";
    ctx.fill();
  });

  shootingStars.forEach((s, i) => {
    s.x += s.speed;
    s.y += s.speed * 0.3;
    s.life++;

    const g = ctx.createLinearGradient(
      s.x, s.y,
      s.x - s.len, s.y - s.len * 0.3
    );

    g.addColorStop(0, "rgba(255,255,255,0.9)");
    g.addColorStop(1, "rgba(255,255,255,0)");

    ctx.strokeStyle = g;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(s.x - s.len, s.y - s.len * 0.3);
    ctx.stroke();

    if (s.life > 20) shootingStars.splice(i, 1);
  });

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
