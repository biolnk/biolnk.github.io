<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>biolnk</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
  --bg: #070712;
  --surface: rgba(255,255,255,0.05);
  --surface-hover: rgba(255,255,255,0.08);
  --border: rgba(255,255,255,0.08);
  --border-hover: rgba(255,255,255,0.2);
  --text: #fff;
  --muted: rgba(255,255,255,0.55);
  --accent: #7c5cff;
  --accent-glow: rgba(124,92,255,0.35);
  --radius: 14px;
  --radius-sm: 10px;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: "Space Grotesk", sans-serif;
}

/* GLOBAL GLOW */
body {
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  text-shadow: 0 0 10px rgba(255,255,255,0.12);
}

/* BACKGROUND */
canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ROOT */
#root {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px 16px;
}

/* CARD (unchanged structure, improved glow) */
.card {
  width: 100%;
  max-width: 420px;
  background: rgba(10,10,18,0.7);
  border: 1px solid var(--border);
  border-radius: 22px;
  padding: 34px;
  backdrop-filter: blur(24px);
  box-shadow: 0 0 60px rgba(0,0,0,0.6);
}

/* TEXT GLOW FIX */
.wordmark,
.profile-name,
.section-label {
  color: #fff;
  text-shadow:
    0 0 10px rgba(255,255,255,0.25),
    0 0 20px rgba(124,92,255,0.25);
}

.wordmark span {
  color: var(--accent);
  text-shadow: 0 0 20px var(--accent-glow);
}

/* INPUTS (same logic safe) */
input, select, textarea {
  width: 100%;
  padding: 11px 14px;
  margin: 6px 0;
  background: var(--surface);
  border: 1px solid var(--border);
  color: #fff;
  border-radius: var(--radius-sm);
  outline: none;
  transition: 0.2s;
}

input:focus {
  border-color: var(--border-hover);
  box-shadow: 0 0 0 3px rgba(124,92,255,0.15);
}

/* BUTTONS */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 11px 18px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface);
  color: #fff;
  cursor: pointer;
  transition: 0.18s;
}

.btn:hover {
  transform: translateY(-1px);
  background: var(--surface-hover);
}

.btn-primary {
  background: var(--accent);
  border: none;
  box-shadow: 0 0 25px var(--accent-glow);
}

/* LINKS */
.profile-links a {
  display: flex;
  gap: 10px;
  padding: 12px;
  margin: 6px 0;
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: #fff;
  text-decoration: none;
  transition: 0.2s;
}

.profile-links a:hover {
  transform: translateX(4px);
  background: var(--surface-hover);
}

/* SPINNER (unchanged safe) */
.spinner {
  width: 18px;
  height: 18px;
  border: 2px solid rgba(255,255,255,0.15);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div id="root">
  <div class="card" id="app">
    <div style="display:flex;justify-content:center;padding:30px">
      <div class="spinner"></div>
    </div>
  </div>
</div>

<script>
/* ───────── SHOOTING STARS BACKGROUND ───────── */
const c = document.getElementById("bg");
const ctx = c.getContext("2d");

function resize(){
  c.width = innerWidth;
  c.height = innerHeight;
}
resize();
addEventListener("resize", resize);

const stars = Array.from({length:100}, () => ({
  x: Math.random()*innerWidth,
  y: Math.random()*innerHeight,
  r: Math.random()*1.2
}));

const shoots = [];

function spawn(){
  shoots.push({
    x: Math.random()*innerWidth,
    y: Math.random()*innerHeight*0.3,
    vx: 5+Math.random()*4,
    vy: 2+Math.random()*3,
    life: 60
  });
}

setInterval(spawn, 2500);

function draw(){
  ctx.clearRect(0,0,c.width,c.height);

  // stars
  for (let s of stars){
    ctx.fillStyle = "rgba(255,255,255,0.8)";
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();
  }

  // shooting stars
  for (let i=shoots.length-1;i>=0;i--){
    let s = shoots[i];
    s.x += s.vx;
    s.y += s.vy;
    s.life--;

    ctx.strokeStyle = "rgba(255,255,255,0.7)";
    ctx.beginPath();
    ctx.moveTo(s.x,s.y);
    ctx.lineTo(s.x-20,s.y-10);
    ctx.stroke();

    if (s.life<=0) shoots.splice(i,1);
  }

  requestAnimationFrame(draw);
}
draw();
</script>

<!-- ⚠️ YOUR ORIGINAL FIREBASE + APP SCRIPT GOES HERE UNTOUCHED ⚠️ -->

</body>
</html>
